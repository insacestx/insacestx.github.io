<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Renters Insurance Application | ACES Insurance Services</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <!-- Global header/footer + language toggle -->
  <script src="global.js" defer></script>

  <!-- Page-specific logic -->
  <script src="application-renters.js" defer></script>
</head>

<body class="dark-theme">

  <!-- Header injected by global.js -->
  <header id="aces-header"></header>

  <main id="main-content">

    <!-- HERO -->
    <section class="page-hero">
      <div class="page-hero-inner">
        <h1 data-en="Renters Insurance Application" data-es="Solicitud de Seguro de Inquilinos">
          Renters Insurance Application
        </h1>
        <p data-en="A quick application to help us find the best renters policy for you."
           data-es="Una solicitud rápida para ayudarle a encontrar la mejor póliza de inquilinos.">
          A quick application to help us find the best renters policy for you.
        </p>
      </div>
    </section>

    <!-- FORM SECTION -->
    <section class="form-section">
      <div class="form-container">

        <h2 data-en="Your Information" data-es="Su Información">Your Information</h2>

        <form id="rentersAppForm">

          <!-- CONTACT INFO -->
          <div class="form-group">
            <label data-en="Full Name" data-es="Nombre Completo">Full Name</label>
            <input type="text" name="fullName" required>
          </div>

          <div class="form-group">
            <label data-en="Phone Number" data-es="Número de Teléfono">Phone Number</label>
            <input type="tel" name="phone" required>
          </div>

          <div class="form-group">
            <label data-en="Email Address" data-es="Correo Electrónico">Email Address</label>
            <input type="email" name="email" required>
          </div>

          <!-- PROPERTY INFO -->
          <h2 data-en="Property Details" data-es="Detalles de la Propiedad">Property Details</h2>

          <div class="form-group">
            <label data-en="Rental Address" data-es="Dirección de la Propiedad">Rental Address</label>
            <input type="text" name="address" required>
          </div>

          <div class="form-group">
            <label data-en="Type of Residence" data-es="Tipo de Residencia">Type of Residence</label>
            <select name="residenceType" required>
              <option value="apartment" data-en="Apartment" data-es="Apartamento">Apartment</option>
              <option value="house" data-en="House" data-es="Casa">House</option>
              <option value="townhome" data-en="Townhome" data-es="Casa Adosada">Townhome</option>
            </select>
          </div>

          <div class="form-group">
            <label data-en="Do you currently have renters insurance?"
                   data-es="¿Actualmente tiene seguro de inquilinos?">
              Do you currently have renters insurance?
            </label>
            <select name="currentPolicy">
              <option value="yes" data-en="Yes" data-es="Sí">Yes</option>
              <option value="no" data-en="No" data-es="No">No</option>
            </select>
          </div>

          <!-- HYBRID COVERAGE QUESTIONS -->
          <h2 data-en="Coverage Details" data-es="Detalles de Cobertura">Coverage Details</h2>

          <div class="form-group">
            <label data-en="Estimated value of your belongings"
                   data-es="Valor estimado de sus pertenencias">
              Estimated value of your belongings
            </label>
            <select name="propertyValue">
              <option value="under10k" data-en="Under $10,000" data-es="Menos de $10,000">Under $10,000</option>
              <option value="10k-20k" data-en="$10,000 - $20,000" data-es="$10,000 - $20,000">$10,000 - $20,000</option>
              <option value="20k-30k" data-en="$20,000 - $30,000" data-es="$20,000 - $30,000">$20,000 - $30,000</option>
              <option value="over30k" data-en="Over $30,000" data-es="Más de $30,000">Over $30,000</option>
            </select>
          </div>

          <div class="form-group">
            <label data-en="Any prior claims in the last 3 years?"
                   data-es="¿Algún reclamo en los últimos 3 años?">
              Any prior claims in the last 3 years?
            </label>
            <select name="claims">
              <option value="none" data-en="No claims" data-es="Sin reclamos">No claims</option>
              <option value="theft" data-en="Theft" data-es="Robo">Theft</option>
              <option value="fire" data-en="Fire" data-es="Incendio">Fire</option>
              <option value="water" data-en="Water Damage" data-es="Daño por Agua">Water Damage</option>
            </select>
          </div>

          <!-- SUBMIT -->
          <button type="submit" class="btn-primary"
            data-en="Submit Application"
            data-es="Enviar Solicitud">
            Submit Application
          </button>

        </form>

      </div>
    </section>

  </main>

  <!-- Footer injected by global.js -->
  <footer id="aces-footer"></footer>

</body>
</html>
