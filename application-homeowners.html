<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title data-en="Homeowners Insurance Application | ACES Insurance Services"
        data-es="Solicitud de Seguro de Hogar | ACES Insurance Services">
  Homeowners Insurance Application | ACES Insurance Services
</title>

<link rel="stylesheet" href="style.css">
<script src="global.js" defer></script>
<script src="application-homeowners.js" defer></script>

</head>
<body>

<header id="aces-header"></header>

<section class="small-hero fade-in">
  <div class="small-hero-content">
    <h1 data-en="Homeowners Insurance Application"
        data-es="Solicitud de Seguro de Hogar">
      Homeowners Insurance Application
    </h1>
    <p data-en="Provide your property details to receive a personalized homeowners quote."
       data-es="Proporcione los detalles de su propiedad para recibir una cotización personalizada de seguro de hogar.">
      Provide your property details to receive a personalized homeowners quote.
    </p>
  </div>
</section>

<section class="app-section fade-in">
  <div class="ho-app-wrapper">

    <!-- PROGRESS STEPS -->
    <div class="ho-steps">
      <div class="ho-step" data-step="1">
        <span>1</span>
        <p data-en="Property" data-es="Propiedad">Property</p>
      </div>
      <div class="ho-step" data-step="2">
        <span>2</span>
        <p data-en="Applicant" data-es="Solicitante">Applicant</p>
      </div>
      <div class="ho-step" data-step="3">
        <span>3</span>
        <p data-en="Coverage" data-es="Cobertura">Coverage</p>
      </div>
      <div class="ho-step" data-step="4">
        <span>4</span>
        <p data-en="Features" data-es="Características">Features</p>
      </div>
      <div class="ho-step" data-step="5">
        <span>5</span>
        <p data-en="Claims & Submit" data-es="Reclamos y Envío">Claims & Submit</p>
      </div>
    </div>

    <!-- FORM -->
    <form id="hoAppForm"
          class="ho-form"
          method="POST"
          action="https://formsubmit.co/office@insaces.com"
          enctype="multipart/form-data">

      <!-- FormSubmit basics -->
      <input type="hidden" name="_subject" value="New Homeowners Application - ACES">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="Application Type" value="Homeowners Insurance">

      <!-- STEP 1: PROPERTY -->
      <div class="ho-step-panel" data-step="1">
        <h2 class="section-title"
            data-en="Property Information"
            data-es="Información de la Propiedad">
          Property Information
        </h2>

        <div class="ho-grid">
          <div class="ho-field ho-field-full">
            <label data-en="Property Address" data-es="Dirección de la Propiedad">
              Property Address
            </label>
            <input type="text" name="Property Address" required>
          </div>

          <div class="ho-field ho-field-full">
            <label data-en="Mailing Address (if different)"
                   data-es="Dirección Postal (si es diferente)">
              Mailing Address (if different)
            </label>
            <input type="text" name="Mailing Address">
          </div>

          <div class="ho-field">
            <label data-en="City" data-es="Ciudad">City</label>
            <input type="text" name="City" required>
          </div>

          <div class="ho-field">
            <label data-en="State" data-es="Estado">State</label>
            <input type="text" name="State" value="TX" required>
          </div>

          <div class="ho-field">
            <label data-en="ZIP Code" data-es="Código Postal">ZIP Code</label>
            <input type="text" name="ZIP" required>
          </div>

          <div class="ho-field">
            <label data-en="County" data-es="Condado">County</label>
            <input type="text" name="County">
          </div>

          <div class="ho-field">
            <label data-en="Occupancy Type" data-es="Tipo de Ocupación">
              Occupancy Type
            </label>
            <select name="Occupancy Type">
              <option value="Primary Residence">Primary Residence</option>
              <option value="Secondary Home">Secondary Home</option>
              <option value="Rental Property">Rental Property</option>
              <option value="Vacant">Vacant</option>
            </select>
          </div>

          <div class="ho-field">
            <label data-en="Year Built" data-es="Año de Construcción">
              Year Built
            </label>
            <input type="number" name="Year Built">
          </div>

          <div class="ho-field">
            <label data-en="Square Footage" data-es="Metros Cuadrados">
              Square Footage
            </label>
            <input type="number" name="Square Footage">
          </div>

          <div class="ho-field">
            <label data-en="Number of Stories" data-es="Número de Pisos">
              Number of Stories
            </label>
            <input type="number" name="Stories">
          </div>

          <div class="ho-field">
            <label data-en="Roof Type" data-es="Tipo de Techo">Roof Type</label>
            <input type="text" name="Roof Type">
          </div>

          <div class="ho-field">
            <label data-en="Roof Age" data-es="Edad del Techo">Roof Age</label>
            <input type="number" name="Roof Age">
          </div>

          <div class="ho-field">
            <label data-en="Construction Type" data-es="Tipo de Construcción">
              Construction Type
            </label>
            <input type="text" name="Construction Type">
          </div>

          <div class="ho-field">
            <label data-en="Foundation Type" data-es="Tipo de Fundación">
              Foundation Type
            </label>
            <input type="text" name="Foundation Type">
          </div>

          <div class="ho-field">
            <label data-en="Heating/Cooling Type"
                   data-es="Tipo de Calefacción/Aire">
              Heating/Cooling Type
            </label>
            <input type="text" name="HVAC Type">
          </div>

          <div class="ho-field">
            <label data-en="Distance to Fire Hydrant"
                   data-es="Distancia a Hidrante">
              Distance to Fire Hydrant
            </label>
            <input type="text" name="Distance to Hydrant">
          </div>

          <div class="ho-field">
            <label data-en="Distance to Fire Station"
                   data-es="Distancia a Estación de Bomberos">
              Distance to Fire Station
            </label>
            <input type="text" name="Distance to Fire Station">
          </div>

          <div class="ho-field">
            <label data-en="Fire Protection Class"
                   data-es="Clase de Protección Contra Incendios">
              Fire Protection Class
            </label>
            <input type="text" name="Fire Protection Class">
          </div>
        </div>
      </div>

      <!-- STEP 2: APPLICANT -->
      <div class="ho-step-panel" data-step="2">
        <h2 class="section-title"
            data-en="Applicant Information"
            data-es="Información del Solicitante">
          Applicant Information
        </h2>

        <div class="ho-grid">
          <div class="ho-field">
            <label data-en="First Name" data-es="Nombre">First Name</label>
            <input type="text" name="First Name" required>
          </div>

          <div class="ho-field">
            <label data-en="Last Name" data-es="Apellido">Last Name</label>
            <input type="text" name="Last Name" required>
          </div>

          <div class="ho-field">
            <label data-en="Date of Birth" data-es="Fecha de Nacimiento">
              Date of Birth
            </label>
            <input type="date" name="DOB" required>
          </div>

          <div class="ho-field">
            <label data-en="Email" data-es="Correo Electrónico">Email</label>
            <input type="email" name="Email" required>
          </div>

          <div class="ho-field">
            <label data-en="Phone" data-es="Teléfono">Phone</label>
            <input type="tel" name="Phone" required>
          </div>

          <div class="ho-field">
            <label data-en="Marital Status" data-es="Estado Civil">
              Marital Status
            </label>
            <select name="Marital Status">
              <option value="Single">Single</option>
              <option value="Married">Married</option>
              <option value="Divorced">Divorced</option>
              <option value="Widowed">Widowed</option>
            </select>
          </div>

          <div class="ho-field">
            <label data-en="Co-Applicant?" data-es="¿Co-Solicitante?">
              Co-Applicant?
            </label>
            <select name="Has Co-Applicant" id="hasCoApplicant">
              <option value="No" data-en="No" data-es="No">No</option>
              <option value="Yes" data-en="Yes" data-es="Sí">Yes</option>
            </select>
          </div>
        </div>

        <!-- CO-APPLICANT SECTION -->
        <div id="coApplicantSection" class="ho-dynamic-group">
          <div class="coapp-card ho-card">
            <h3 data-en="Co-Applicant" data-es="Co-Solicitante">Co-Applicant</h3>

            <div class="ho-grid">
              <div class="ho-field">
                <label data-en="Full Name" data-es="Nombre Completo">
                  Full Name
                </label>
                <input type="text" name="Co-Applicant - Full Name">
              </div>

              <div class="ho-field">
                <label data-en="Date of Birth" data-es="Fecha de Nacimiento">
                  Date of Birth
                </label>
                <input type="date" name="Co-Applicant - DOB">
              </div>

              <div class="ho-field">
                <label data-en="Relationship" data-es="Relación">
                  Relationship
                </label>
                <input type="text" name="Co-Applicant - Relationship">
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- STEP 3: COVERAGE -->
      <div class="ho-step-panel" data-step="3">
        <h2 class="section-title"
            data-en="Coverage Details"
            data-es="Detalles de Cobertura">
          Coverage Details
        </h2>

        <div class="ho-grid">
          <div class="ho-field">
            <label data-en="Desired Effective Date"
                   data-es="Fecha de Inicio Deseada">
              Desired Effective Date
            </label>
            <input type="date" name="Desired Effective Date">
          </div>

          <div class="ho-field">
            <label data-en="Current Carrier"
                   data-es="Aseguradora Actual">
              Current Carrier
            </label>
            <input type="text" name="Current Carrier">
          </div>

          <div class="ho-field">
            <label data-en="Current Premium"
                   data-es="Prima Actual">
              Current Premium
            </label>
            <input type="text" name="Current Premium">
          </div>

          <div class="ho-field">
            <label data-en="Policy Expiration"
                   data-es="Vencimiento de la Póliza">
              Policy Expiration
            </label>
            <input type="date" name="Policy Expiration">
          </div>

          <div class="ho-field">
            <label data-en="Dwelling Coverage (A)"
                   data-es="Cobertura de Vivienda (A)">
              Dwelling Coverage (A)
            </label>
            <input type="text" name="Coverage A">
          </div>

          <div class="ho-field">
            <label data-en="Personal Property (C)"
                   data-es="Propiedad Personal (C)">
              Personal Property (C)
            </label>
            <input type="text" name="Coverage C">
          </div>

          <div class="ho-field">
            <label data-en="Liability Limits"
                   data-es="Límites de Responsabilidad">
              Liability Limits
            </label>
            <select name="Liability Limits">
              <option value="$100,000">$100,000</option>
              <option value="$300,000">$300,000</option>
              <option value="$500,000">$500,000</option>
              <option value="$1,000,000">$1,000,000</option>
            </select>
          </div>

          <div class="ho-field">
            <label data-en="Deductible" data-es="Deducible">Deductible</label>
            <input type="text" name="Deductible">
          </div>

          <div class="ho-field">
            <label data-en="Wind/Hail Deductible"
                   data-es="Deducible de Viento/Granizo">
              Wind/Hail Deductible
            </label>
            <input type="text" name="Wind Hail Deductible">
          </div>

          <div class="ho-field">
            <label data-en="Replacement Cost?"
                   data-es="¿Costo de Reemplazo?">
              Replacement Cost?
            </label>
            <select name="Replacement Cost">
              <option value="Yes" data-en="Yes" data-es="Sí">Yes</option>
              <option value="No" data-en="No" data-es="No">No</option>
            </select>
          </div>

          <div class="ho-field">
            <label data-en="Water Backup?"
                   data-es="¿Respaldo de Agua?">
              Water Backup?
            </label>
            <select name="Water Backup">
              <option value="Yes" data-en="Yes" data-es="Sí">Yes</option>
              <option value="No" data-en="No" data-es="No">No</option>
            </select>
          </div>

          <div class="ho-field">
            <label data-en="Equipment Breakdown?"
                   data-es="¿Daño de Equipos?">
              Equipment Breakdown?
            </label>
            <select name="Equipment Breakdown">
              <option value="Yes" data-en="Yes" data-es="Sí">Yes</option>
              <option value="No" data-en="No" data-es="No">No</option>
            </select>
          </div>

          <div class="ho-field">
            <label data-en="Flood Insurance Needed?"
                   data-es="¿Necesita Seguro Contra Inundaciones?">
              Flood Insurance Needed?
            </label>
            <select name="Flood Insurance Needed">
              <option value="Yes" data-en="Yes" data-es="Sí">Yes</option>
              <option value="No" data-en="No" data-es="No">No</option>
            </select>
          </div>
        </div>
      </div>

      <!-- STEP 4: FEATURES -->
      <div class="ho-step-panel" data-step="4">
        <h2 class="section-title"
            data-en="Property Features"
            data-es="Características de la Propiedad">
          Property Features
        </h2>

        <div class="ho-grid">
          <div class="ho-field">
            <label data-en="Dogs on Premises?" data-es="¿Perros en la Propiedad?">
              Dogs on Premises?
            </label>
            <select name="Dogs on Premises">
              <option value="No">No</option>
              <option value="Yes">Yes</option>
            </select>
          </div>

          <div class="ho-field">
            <label data-en="Trampoline?" data-es="¿Trampolín?">Trampoline?</label>
            <select name="Trampoline">
              <option value="No">No</option>
              <option value="Yes">Yes</option>
            </select>
          </div>

          <div class="ho-field">
            <label data-en="Pool?" data-es="¿Piscina?">Pool?</label>
            <select name="Pool" id="hasPool">
              <option value="No">No</option>
              <option value="Yes">Yes</option>
            </select>
          </div>

          <div class="ho-field ho-pool-extra">
            <label data-en="Is the pool fenced?"
                   data-es="¿La piscina está cercada?">
              Is the pool fenced?
            </label>
            <select name="Pool Fenced">
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>

          <div class="ho-field">
            <label data-en="Security System?"
                   data-es="¿Sistema de Seguridad?">
              Security System?
            </label>
            <select name="Security System">
              <option value="No">No</option>
              <option value="Yes">Yes</option>
            </select>
          </div>

          <div class="ho-field">
            <label data
