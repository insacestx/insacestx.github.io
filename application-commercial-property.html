<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title data-en="Commercial Property Application | ACES Insurance Services"
        data-es="Solicitud de Seguro de Propiedad Comercial | ACES Insurance Services">
  Commercial Property Application | ACES Insurance Services
</title>

<link rel="stylesheet" href="style.css">
<script src="global.js" defer></script>
<script src="application-commercial-property.js" defer></script>

</head>
<body>

<header id="aces-header"></header>

<section class="small-hero cp-hero fade-in">
  <div class="small-hero-content">
    <h1 data-en="Commercial Property Application"
        data-es="Solicitud de Seguro de Propiedad Comercial">
      Commercial Property Application
    </h1>
    <p data-en="Provide your business and building information to receive a commercial property quote."
       data-es="Proporcione la información de su negocio y edificio para recibir una cotización de propiedad comercial.">
      Provide your business and building information to receive a commercial property quote.
    </p>
  </div>
</section>

<section class="app-section fade-in">

  <!-- STEP INDICATOR -->
  <div class="wizard-steps cp-wizard-steps">
    <div class="wizard-step active" data-step="1">
      <span class="wizard-step-icon">🏢</span>
      <span data-en="Business" data-es="Negocio">Business</span>
    </div>
    <div class="wizard-step" data-step="2">
      <span class="wizard-step-icon">🏬</span>
      <span data-en="Building" data-es="Edificio">Building</span>
    </div>
    <div class="wizard-step" data-step="3">
      <span class="wizard-step-icon">📦</span>
      <span data-en="Property" data-es="Propiedad">Property</span>
    </div>
    <div class="wizard-step" data-step="4">
      <span class="wizard-step-icon">🛡️</span>
      <span data-en="Coverage" data-es="Cobertura">Coverage</span>
    </div>
    <div class="wizard-step" data-step="5">
      <span class="wizard-step-icon">✔️</span>
      <span data-en="Submit" data-es="Enviar">Submit</span>
    </div>
  </div>

  <form id="commercialPropertyForm"
        action="https://formsubmit.co/office@insaces.com"
        method="POST"
        enctype="multipart/form-data"
        class="app-form cp-app-form">

    <!-- Round Robin -->
    <input type="hidden" name="_to" id="rrEmail">
    <input type="hidden" name="_subject" value="New Commercial Property Application - ACES">
    <input type="hidden" name="_template" value="table">
    <input type="text" name="_honey" style="display:none">

    <!-- STEP 1: BUSINESS INFO -->
    <div class="form-step active" data-step="1">

      <h2 data-en="Business Information" data-es="Información del Negocio">
        Business Information
      </h2>

      <div class="form-grid">

        <div class="form-field">
          <label data-en="Business Name" data-es="Nombre del Negocio">Business Name</label>
          <input type="text" name="business_name" required>
        </div>

        <div class="form-field">
          <label data-en="Business Address" data-es="Dirección del Negocio">Business Address</label>
          <input type="text" name="business_address" required>
        </div>

        <div class="form-field">
          <label data-en="City" data-es="Ciudad">City</label>
          <input type="text" name="business_city" required>
        </div>

        <div class="form-field">
          <label data-en="State" data-es="Estado">State</label>
          <input type="text" name="business_state" required>
        </div>

        <div class="form-field">
          <label data-en="ZIP Code" data-es="Código Postal">ZIP Code</label>
          <input type="text" name="business_zip" required>
        </div>

        <div class="form-field">
          <label data-en="Business Type" data-es="Tipo de Negocio">Business Type</label>
          <input type="text" name="business_type" required>
        </div>

        <div class="form-field">
          <label data-en="Years in Business" data-es="Años en el Negocio">Years in Business</label>
          <input type="number" name="years_in_business">
        </div>

      </div>

      <div class="wizard-nav">
        <button type="button" class="btn-primary next-step"
                data-next="2"
                data-en="Next: Building"
                data-es="Siguiente: Edificio">
          Next: Building
        </button>
      </div>

    </div>

    <!-- STEP 2: BUILDING INFO -->
    <div class="form-step" data-step="2">

      <h2 data-en="Building Information" data-es="Información del Edificio">
        Building Information
      </h2>

      <div class="form-grid">

        <div class="form-field">
          <label data-en="Building Address" data-es="Dirección del Edificio">Building Address</label>
          <input type="text" name="building_address" required>
        </div>

        <div class="form-field">
          <label data-en="City" data-es="Ciudad">City</label>
          <input type="text" name="building_city" required>
        </div>

        <div class="form-field">
          <label data-en="State" data-es="Estado">State</label>
          <input type="text" name="building_state" required>
        </div>

        <div class="form-field">
          <label data-en="ZIP Code" data-es="Código Postal">ZIP Code</label>
          <input type="text" name="building_zip" required>
        </div>

        <div class="form-field">
          <label data-en="Year Built" data-es="Año de Construcción">Year Built</label>
          <input type="text" name="year_built">
        </div>

        <div class="form-field">
          <label data-en="Construction Type" data-es="Tipo de Construcción">Construction Type</label>
          <select name="construction_type">
            <option value="">Select...</option>
            <option value="Frame">Frame</option>
            <option value="Masonry">Masonry</option>
            <option value="Metal">Metal</option>
            <option value="Concrete">Concrete</option>
          </select>
        </div>

        <div class="form-field">
          <label data-en="Square Footage" data-es="Pies Cuadrados">Square Footage</label>
          <input type="text" name="sqft">
        </div>

      </div>

      <div class="wizard-nav">
        <button type="button" class="btn-secondary prev-step"
                data-prev="1"
                data-en="Back"
                data-es="Atrás">
          Back
        </button>
        <button type="button" class="btn-primary next-step"
                data-next="3"
                data-en="Next: Property"
                data-es="Siguiente: Propiedad">
          Next: Property
        </button>
      </div>

    </div>

    <!-- STEP 3: PROPERTY DETAILS -->
    <div class="form-step" data-step="3">

      <h2 data-en="Property Details" data-es="Detalles de la Propiedad">
        Property Details
      </h2>

      <div class="form-grid">

        <div class="form-field">
          <label data-en="Business Personal Property Amount"
                 data-es="Monto de Propiedad Personal del Negocio">
            Business Personal Property Amount
          </label>
          <input type="number" name="bpp_amount">
        </div>

        <div class="form-field">
          <label data-en="Inventory Value"
                 data-es="Valor del Inventario">
            Inventory Value
          </label>
          <input type="number" name="inventory_value">
        </div>

        <div class="form-field">
          <label data-en="Any prior property claims?"
                 data-es="¿Algún reclamo previo de propiedad?">
            Any prior property claims?
          </label>
          <textarea name="prior_claims" rows="3"></textarea>
        </div>

      </div>

      <div class="wizard-nav">
        <button type="button" class="btn-secondary prev-step"
                data-prev="2"
                data-en="Back"
                data-es="Atrás">
          Back
        </button>
        <button type="button" class="btn-primary next-step"
                data-next="4"
                data-en="Next: Coverage"
                data-es="Siguiente: Cobertura">
          Next: Coverage
        </button>
      </div>

    </div>

    <!-- STEP 4: COVERAGE -->
    <div class="form-step" data-step="4">

      <h2 data-en="Coverage Options" data-es="Opciones de Cobertura">
        Coverage Options
      </h2>

      <div class="form-grid">

        <div class="form-field">
          <label data-en="Building Coverage Amount"
                 data-es="Monto de Cobertura del Edificio">
            Building Coverage Amount
          </label>
          <input type="number" name="building_coverage">
        </div>

        <div class="form-field">
          <label data-en="Business Income Coverage"
                 data-es="Cobertura de Ingresos del Negocio">
            Business Income Coverage
          </label>
          <select name="business_income">
            <option value="">Select...</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
            <option value="Unsure">Unsure</option>
          </select>
        </div>

      </div>

      <div class="wizard-nav">
        <button type="button" class="btn-secondary prev-step"
                data-prev="3"
                data-en="Back"
                data-es="Atrás">
          Back
        </button>
        <button type="button" class="btn-primary next-step"
                data-next="5"
                data-en="Next: Submit"
                data-es="Siguiente: Enviar">
          Next: Submit
        </button>
      </div>

    </div>

    <!-- STEP 5: SUBMIT -->
    <div class="form-step" data-step="5">

      <h2 data-en="Submit Application" data-es="Enviar Solicitud">
        Submit Application
      </h2>

      <div class="form-field">
        <label data-en="Upload Documents (Optional)"
               data-es="Cargar Documentos (Opcional)">
          Upload Documents (Optional)
        </label>
        <input type="file" name="documents" multiple>
      </div>

      <div class="form-field checkbox-field">
        <label>
          <input type="checkbox" name="consent" required>
          <span data-en="I confirm the information provided is accurate."
                data-es="Confirmo que la información proporcionada es correcta.">
            I confirm the information provided is accurate.
          </span>
        </label>
      </div>

      <div class="wizard-nav">
        <button type="button" class="btn-secondary prev-step"
                data-prev="4"
                data-en="Back"
                data-es="Atrás">
          Back
        </button>
        <button type="submit" class="btn-primary"
                data-en="Submit Application"
                data-es="Enviar Solicitud">
          Submit Application
        </button>
      </div>

    </div>

  </form>

</section>

<footer id="aces-footer"></footer>

</body>
</html>
