<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title
    data-en="Quote Submitted Successfully | ACES Insurance Services"
    data-es="Cotización Enviada con Éxito | ACES Insurance Services">
    Quote Submitted Successfully | ACES Insurance Services
  </title>

  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/wizard.css" />

  <script src="/global.js" defer></script>

  <style>
    .success-card {
      max-width: 700px;
      margin: 40px auto;
      background: #fff;
      padding: 40px;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
      animation: fadeUp 0.6s ease;
    }

    .success-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: #d32f2f;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 42px;
      font-weight: bold;
    }

    .success-id {
      margin-top: 20px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #333;
    }

    .success-actions {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .success-actions a {
      padding: 14px 20px;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
    }

    .primary-btn {
      background: #d32f2f;
      color: #fff;
    }

    .secondary-btn {
      background: #f5f5f5;
      color: #333;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const id = sessionStorage.getItem("aces_quote_id") 
              || "Q-" + Math.floor(Math.random() * 900000 + 100000);

      document.getElementById("confirmation-id").textContent = id;

      sessionStorage.setItem("aces_quote_id", id);
    });
  </script>
</head>

<body>

<header id="aces-header"></header>

<main class="fade-in">

  <!-- HERO SECTION -->
  <section class="quote-hero">
    <div class="quote-hero-inner">

      <div class="quote-hero-text">
        <h1
          data-en="Thank You!"
          data-es="¡Gracias!">
          Thank You!
        </h1>

        <p
          data-en="Your quote request has been submitted successfully."
          data-es="Su solicitud de cotización ha sido enviada con éxito.">
          Your quote request has been submitted successfully.
        </p>
      </div>

      <!-- HERO IMAGE PLACEHOLDER -->
      <div class="quote-hero-image"></div>

    </div>
  </section>

  <!-- SUCCESS CARD -->
  <section>
    <div class="success-card">

      <div class="success-icon">✓</div>

      <h2
        data-en="We’ve Received Your Information"
        data-es="Hemos Recibido Su Información">
        We’ve Received Your Information
      </h2>

      <p
        data-en="An ACES agent will review your details and contact you shortly."
        data-es="Un agente de ACES revisará sus detalles y se comunicará con usted pronto.">
        An ACES agent will review your details and contact you shortly.
      </p>

      <div class="success-id">
        <span data-en="Confirmation ID:" data-es="ID de Confirmación:">Confirmation ID:</span>
        <strong id="confirmation-id">—</strong>
      </div>

      <div class="success-actions">
        <a href="/quote-status.html" class="primary-btn">
          <span data-en="Check Quote Status" data-es="Ver Estado de la Cotización">
            Check Quote Status
          </span>
        </a>

        <a href="/get-a-quote.html" class="secondary-btn">
          <span data-en="Submit Another Quote" data-es="Enviar Otra Cotización">
            Submit Another Quote
          </span>
        </a>

        <a href="/contact.html" class="secondary-btn">
          <span data-en="Contact Our Team" data-es="Contactar a Nuestro Equipo">
            Contact Our Team
          </span>
        </a>
      </div>

    </div>
  </section>

</main>

<footer id="aces-footer"></footer>

</body>
</html>
