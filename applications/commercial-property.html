<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title data-en="Commercial Property Application" data-es="Solicitud de Seguro de Propiedad Comercial">
    Commercial Property Application
  </title>

  <!-- Correct GitHub Pages Paths -->
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../wizard.css">

  <script src="../global.js" defer></script>
  <script src="../wizard.js" defer></script>
</head>

<body>

<header id="aces-header"></header>

<main class="fade-in">

  <!-- HERO -->
  <section class="auto-hero">
    <div class="auto-hero-inner">

      <h1 data-en="Commercial Property Application" data-es="Solicitud de Seguro de Propiedad Comercial">
        Commercial Property Application
      </h1>

      <p data-en="Tell us about your building, contents, and business location."
         data-es="Cuéntenos sobre su edificio, contenido y ubicación del negocio.">
        Tell us about your building, contents, and business location.
      </p>

      <div id="wizard-tabs"></div>

    </div>
  </section>

  <!-- WIZARD -->
  <section class="auto-app-wrapper">
    <div class="auto-app-card">

      <div id="wizard-container"></div>

      <div class="wizard-progress-bar">
        <div id="wizard-progress"></div>
      </div>

    </div>
  </section>

</main>

<footer id="aces-footer"></footer>

<!-- ============================================================
     EMBEDDED COMMERCIAL PROPERTY CONFIG (DEFAULT QUESTIONS)
============================================================ -->
<script>
  const applicationConfig = {
    appName: "commercial-property",
    steps: [
      {
        id: "step1",
        title_en: "Business Information",
        title_es: "Información del Negocio",
        fields: [
          { type: "text", name: "businessName", label_en: "Business Name", label_es: "Nombre del Negocio", required: true },
          { type: "text", name: "locationAddress", label_en: "Location Address", label_es: "Dirección del Local", required: true },
          { type: "text", name: "contactName", label_en: "Contact Name", label_es: "Nombre del Contacto", required: true },
          { type: "tel", name: "contactPhone", label_en: "Contact Phone", label_es: "Teléfono del Contacto", required: true }
        ]
      },

      {
        id: "step2",
        title_en: "Property Values",
        title_es: "Valores de la Propiedad",
        fields: [
          {
            type: "number",
            name: "buildingValue",
            label_en: "Building Value ($)",
            label_es: "Valor del Edificio ($)",
            required: true
          },
          {
            type: "number",
            name: "contentsValue",
            label_en: "Contents Value ($)",
            label_es: "Valor del Contenido ($)",
            required: true
          }
        ]
      },

      {
        id: "step3",
        title_en: "Building Details",
        title_es: "Detalles del Edificio",
        fields: [
          {
            type: "select",
            name: "occupancyType",
            label_en: "Occupancy Type",
            label_es: "Tipo de Ocupación",
            required: true,
            options_en: ["Office", "Retail", "Warehouse", "Restaurant", "Mixed Use"],
            options_es: ["Oficina", "Comercio", "Almacén", "Restaurante", "Uso Mixto"]
          },
          {
            type: "select",
            name: "constructionType",
            label_en: "Construction Type",
            label_es: "Tipo de Construcción",
            required: true,
            options_en: ["Frame", "Joisted Masonry", "Non-Combustible", "Masonry Non-Combustible", "Fire Resistive"],
            options_es: ["Madera", "Mampostería con Vigas", "No Combustible", "Mampostería No Combustible", "Resistente al Fuego"]
          },
          {
            type: "number",
            name: "yearBuilt",
            label_en: "Year Built",
            label_es: "Año de Construcción",
            required: true
          },
          {
            type: "number",
            name: "protectionClass",
            label_en: "Protection Class",
            label_es: "Clase de Protección",
            required: false
          }
        ]
      },

      {
        id: "step4",
        title_en: "Coverage Details",
        title_es: "Detalles de Cobertura",
        fields: [
          {
            type: "number",
            name: "deductible",
            label_en: "Deductible ($)",
            label_es: "Deducible ($)",
            required: true
          },
          {
            type: "checkbox",
            name: "replacementCost",
            label_en: "Replacement Cost Coverage",
            label_es: "Cobertura de Costo de Reemplazo"
          },
          {
            type: "checkbox",
            name: "businessIncome",
            label_en: "Business Income Coverage",
            label_es: "Cobertura de Ingresos del Negocio"
          }
        ]
      },

      {
        id: "step5",
        title_en: "Additional Interests",
        title_es: "Intereses Adicionales",
        fields: [
          {
            type: "textarea",
            name: "additionalInterests",
            label_en: "List Any Additional Interests",
            label_es: "Liste Cualquier Interés Adicional",
            required: false
          }
        ]
      }
    ]
  };
</script>

</body>
</html>
