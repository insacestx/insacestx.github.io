<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATV Application | ACES Insurance Services</title>

  <!-- CORRECT CSS (Root‑Absolute) -->
  <link rel="stylesheet" href="/style.css">

  <!-- CORRECT JS (Root‑Absolute) -->
  <script src="/global.js" defer></script>
  <script>
    function buildReview() {
  fill("reviewPersonal", [
    { label: "First Name", value: val("first_name") },
    { label: "Last Name", value: val("last_name") },
    { label: "Phone", value: val("phone") },
    { label: "Email", value: val("email") }
  ]);

  fill("reviewATV", [
    { label: "Year", value: val("atv_year") },
    { label: "Make", value: val("atv_make") },
    { label: "Model", value: val("atv_model") },
    { label: "VIN", value: val("atv_vin") },
    { label: "Vehicle Type", value: val("atv_type") }
  ]);

  fill("reviewCoverage", [
    { label: "Liability", value: val("liability") },
    { label: "Comp/Collision", value: val("comp_collision") },
    { label: "Medical", value: val("medical") },
    { label: "Accessories", value: val("accessories") },
    { label: "Notes", value: val("notes") }
  ]);
}
</script>
</head>

<body>

  <!-- HEADER -->
  <header id="aces-header"></header>

  <main class="fade-in">

    <!-- HERO -->
    <section class="auto-hero">
      <div class="auto-hero-inner">

        <h1 data-en="ATV / UTV Insurance Application"
            data-es="Solicitud de Seguro para ATV / UTV">
          ATV / UTV Insurance Application
        </h1>

        <p data-en="Tell us about you and your off-road vehicle. An ACES agent will review and follow up with tailored options."
           data-es="Cuéntenos sobre usted y su vehículo todoterreno. Un agente de ACES revisará y le dará opciones personalizadas.">
          Tell us about you and your off-road vehicle. An ACES agent will review and follow up with tailored options.
        </p>

        <!-- Wizard Steps -->
        <div class="auto-wizard-steps" id="atvWizardSteps">
          <div class="auto-wizard-step active" data-step="1">
            <span class="step-index">1</span> Personal & Vehicle
          </div>
          <div class="auto-wizard-step" data-step="2">
            <span class="step-index">2</span> Coverage
          </div>
          <div class="auto-wizard-step" data-step="3">
            <span class="step-index">3</span> Review
          </div>
        </div>

      </div>
    </section>

    <!-- FORM -->
    <section class="auto-app-wrapper">
      <div class="auto-app-card">

        <form id="atvAppForm"
              method="POST"
              action="https://formsubmit.co/office@insaces.com"
              enctype="multipart/form-data">

          <input type="hidden" name="_subject" value="New ATV/UTV Insurance Application - ACES">
          <input type="hidden" name="_captcha" value="false">
          <input type="text" name="_honey" style="display:none">
          <input type="hidden" id="rrEmail" name="rrEmail">

          <!-- STEP 1 -->
          <div class="form-step active" data-step="1">
            <h2>Personal & Vehicle Information</h2>
            <p class="section-subtitle">Tell us about yourself and your ATV, UTV, or off-road vehicle.</p>

            <div class="auto-grid-2">

              <!-- PERSONAL -->
              <div class="auto-field">
                <label>First Name</label>
                <input name="first_name" required>
              </div>

              <div class="auto-field">
                <label>Last Name</label>
                <input name="last_name" required>
              </div>

              <!-- Add your remaining fields here -->

            </div>
          </div>

          <!-- STEP 2, STEP 3, etc. go here -->

        </form>

      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer id="aces-footer"></footer>

</body>
</html>
