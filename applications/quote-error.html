<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title
    data-en="Submission Error | ACES Insurance Services"
    data-es="Error de Envío | ACES Insurance Services">
    Submission Error | ACES Insurance Services
  </title>

  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/wizard.css" />

  <script src="/global.js" defer></script>

  <style>
    .error-card {
      max-width: 700px;
      margin: 40px auto;
      background: #fff;
      padding: 40px;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
      animation: fadeUp 0.6s ease;
    }

    .error-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: #b71c1c;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 42px;
      font-weight: bold;
    }

    .error-actions {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .error-actions a {
      padding: 14px 20px;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
    }

    .primary-btn {
      background: #d32f2f;
      color: #fff;
    }

    .secondary-btn {
      background: #f5f5f5;
      color: #333;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<header id="aces-header"></header>

<main class="fade-in">

  <!-- HERO SECTION -->
  <section class="quote-hero">
    <div class="quote-hero-inner">

      <div class="quote-hero-text">
        <h1
          data-en="Something Went Wrong"
          data-es="Algo Salió Mal">
          Something Went Wrong
        </h1>

        <p
          data-en="We were unable to submit your request."
          data-es="No pudimos enviar su solicitud.">
          We were unable to submit your request.
        </p>
      </div>

      <div class="quote-hero-image"></div>

    </div>
  </section>

  <!-- ERROR CARD -->
  <section>
    <div class="error-card">

      <div class="error-icon">!</div>

      <h2
        data-en="Submission Failed"
        data-es="El Envío Falló">
        Submission Failed
      </h2>

      <p
        data-en="Please try again or contact our team for assistance."
        data-es="Por favor intente nuevamente o contacte a nuestro equipo para obtener ayuda.">
        Please try again or contact our team for assistance.
      </p>

      <div class="error-actions">
        <a href="/get-a-quote.html" class="primary-btn">
          <span data-en="Try Again" data-es="Intentar de Nuevo">
            Try Again
          </span>
        </a>

        <a href="/contact.html" class="secondary-btn">
          <span data-en="Contact Support" data-es="Contactar Soporte">
            Contact Support
          </span>
        </a>
      </div>

    </div>
  </section>

</main>

<footer id="aces-footer"></footer>

</body>
</html>
