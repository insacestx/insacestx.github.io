<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title data-en="Thank You | ACES Insurance Services"
        data-es="Gracias | ACES Insurance Services">
  Thank You | ACES Insurance Services
</title>

<link rel="stylesheet" href="style.css">
<script src="global.js" defer></script>

<!-- Auto‑redirect to Contact page after 5 seconds -->
<script>
  setTimeout(() => {
    window.location.href = "contact.html";
  }, 5000);
</script>

<style>
  .thankyou-wrapper {
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px 20px;
  }

  .thankyou-wrapper h1 {
    font-size: 2.2rem;
    margin-bottom: 15px;
  }

  .thankyou-wrapper p {
    font-size: 1.1rem;
    margin-bottom: 20px;
    max-width: 600px;
  }

  .thankyou-btn {
    display: inline-block;
    background: #d40000;
    color: #fff;
    padding: 10px 20px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
  }

  .thankyou-note {
    margin-top: 15px;
    font-size: 0.95rem;
    color: #ccc;
  }
</style>

</head>
<body>

<!-- HEADER -->
<header id="aces-header"></header>

<!-- ============================================================
     SMALL HERO — ACES 2026
============================================================ -->
<section class="small-hero fade-in">
  <div class="small-hero-content">
    <h1 data-en="Thank You"
        data-es="Gracias">
      Thank You
    </h1>

    <p data-en="Your submission has been received."
       data-es="Su solicitud ha sido recibida.">
      Your submission has been received.
    </p>
  </div>
</section>

<!-- ============================================================
     THANK YOU CONTENT (DARK SECTION)
============================================================ -->
<section class="team-section fade-in">
  <div class="thankyou-wrapper">

    <h1 data-en="Thank you for your submission."
        data-es="Gracias por su solicitud.">
      Thank you for your submission.
    </h1>

    <p data-en="Someone from our team will be in touch with you as soon as possible."
       data-es="Alguien de nuestro equipo se pondrá en contacto con usted lo antes posible.">
      Someone from our team will be in touch with you as soon as possible.
    </p>

    <a href="contact.html"
       class="thankyou-btn"
       data-en="Go to Contact Page"
       data-es="Ir a la Página de Contacto">
      Go to Contact Page
    </a>

    <p class="thankyou-note"
       data-en="You will be redirected shortly."
       data-es="Será redirigido en unos momentos.">
      You will be redirected shortly.
    </p>

  </div>
</section>

<!-- FOOTER -->
<footer id="aces-footer"></footer>

</body>
</html>
