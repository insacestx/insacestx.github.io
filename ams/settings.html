<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACES AMS | Settings</title>
  <link rel="stylesheet" href="style-ams.css">
</head>

<body>
  <aside class="sidebar">
    <div class="logo"><img src="/images/image2.png"></div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="clients.html">Clients</a>
      <a href="policies.html">Policies</a>
      <a href="cois.html" class="active">COIs</a>
      <a href="claims.html">Claims</a>
      <a href="tasks.html">Tasks</a>
      <a href="/ams/leads.html">Leads</a>
      <a href="agents.html">Agents</a>
      <a href="settings.html">Settings</a>
    </nav>
  </aside>

  <main class="content">
    <div class="page-header">
      <h1>Settings</h1>
    </div>

    <section class="client-info">
      <h2>Agency Information</h2>
      <p><strong>Agency Name:</strong> <input id="agencyName" value="ACES Insurance Services"></p>
      <p><strong>Phone:</strong> <input id="agencyPhone" value="254-227-6560"></p>
      <p><strong>Email:</strong> <input id="agencyEmail" value="office@insaces.com"></p>
      <button class="btn-red small" onclick="saveAgencySettings()">Save</button>
    </section>

    <section class="client-section">
      <h2>Branding</h2>
      <p><strong>Logo:</strong></p>
      <input type="file" id="logoUpload">
      <button class="btn-red small" onclick="uploadLogo()">Upload Logo</button>
    </section>

    <section class="client-section">
      <h2>Notifications</h2>
      <label><input type="checkbox" id="notifyCOI" checked> COI Requests</label><br>
      <label><input type="checkbox" id="notifyClaims" checked> Claims Updates</label><br>
      <label><input type="checkbox" id="notifyTasks" checked> Task Reminders</label><br>
      <button class="btn-red small" onclick="saveNotifications()">Save Notifications</button>
    </section>

    <section class="client-section">
      <h2>System</h2>
      <button class="btn-red small" onclick="exportData()">Export Data</button>
      <button class="btn-red small" onclick="importData()">Import Data</button>
    </section>

  </main>

  <script src="ams.js"></script>
</body>
</html>
