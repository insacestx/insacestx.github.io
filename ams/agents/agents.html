<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACES AMS | Agents</title>

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="style-ams.css">

  <script src="../global.js" defer></script>
  <script src="ams.js" defer></script>
</head>

<body>
  <header id="aces-header"></header>

  <div class="ams-app">
    <aside class="sidebar">
      <div class="logo">
        <img src="../images/image2.png" alt="ACES Logo">
      </div>

      <nav aria-label="AMS navigation">
        <a href="dashboard/dashboard.html">Dashboard</a>
        <a href="dashboard/clients.html">Clients</a>
        <a href="dashboard/policies.html">Policies</a>
        <a href="dashboard/cois.html">COIs</a>

        <a href="agents.html" class="active" aria-current="page">Agents</a>
        <a href="dashboard/settings.html">Settings</a>
        <a href="#" id="logoutLink">Logout</a>
      </nav>
    </aside>

    <main class="content" role="main">
      <div class="page-header">
        <h1>Agents</h1>
        <button class="btn-red" id="addAgentBtn" type="button">+ Add Agent</button>
      </div>

      <div class="search-bar">
        <label for="agentSearch" class="sr-only">Search agents</label>
        <input type="text" id="agentSearch" placeholder="Search agents...">
      </div>

      <div class="agent-grid" id="agentGrid"></div>
    </main>
  </div>

  <footer id="aces-footer"></footer>

</html>
