<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACES AMS | Tasks</title>
  <link rel="stylesheet" href="style-ams.css">
</head>

<body>
  <aside class="sidebar">
    <div class="logo"><img src="/images/image2.png"></div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="clients.html">Clients</a>
      <a href="policies.html">Policies</a>
      <a href="cois.html">COIs</a>
      <a href="claims.html">Claims</a>
      <a href="tasks.html" class="active">Tasks</a>
      <a href="agents.html">Agents</a>
      <a href="settings.html">Settings</a>
    </nav>
  </aside>

  <main class="content">
    <div class="page-header">
      <h1>Tasks</h1>
      <button class="btn-red" onclick="addTask()">+ Add Task</button>
    </div>

    <div class="search-bar">
      <input type="text" id="taskSearch" placeholder="Search tasks..." onkeyup="filterTasks()">
    </div>

    <table class="data-table" id="taskTable">
      <thead>
        <tr>
          <th>Task</th>
          <th>Client</th>
          <th>Due Date</th>
          <th>Assigned To</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="taskRows"></tbody>
    </table>
  </main>

  <script src="ams.js"></script>
</body>
</html>
