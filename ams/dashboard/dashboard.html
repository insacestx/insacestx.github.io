<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACES AMS | Dashboard</title>
  <link rel="stylesheet" href="style-ams.css">
</head>

<body>
  <aside class="sidebar">
    <div class="logo"><img src="/images/image2.png"></div>
    <nav>
      <a href="dashboard.html" class="active">Dashboard</a>
      <a href="clients.html">Clients</a>
      <a href="policies.html">Policies</a>
      <a href="cois.html">COIs</a>
      <a href="claims.html">Claims</a>
      <a href="tasks.html">Tasks</a>
      <a href="agents.html">Agents</a>
      <a href="settings.html">Settings</a>
    </nav>
  </aside>

  <main class="content">
    <h1>ACES AMS Dashboard</h1>

    <section class="cards">
      <div class="card">
        <h2>New Leads</h2>
        <p id="leadCount">0</p>
      </div>

      <div class="card">
        <h2>Pending COIs</h2>
        <p id="coiCount">0</p>
      </div>

      <div class="card">
        <h2>Open Claims</h2>
        <p id="claimCount">0</p>
      </div>

      <div class="card">
        <h2>Tasks Due Today</h2>
        <p id="taskCount">0</p>
      </div>
    </section>

    <section class="recent">
      <h2>Recent Activity</h2>
      <ul id="activityFeed"></ul>
    </section>
    <section class="submissions">
  <h2>Recent Submissions</h2>

  <div class="submissions-controls">
    <input id="searchInput" type="text" placeholder="Search..." class="search-bar">

    <select id="statusFilter" class="filter-select">
      <option value="all">All Statuses</option>
      <option value="new">New</option>
      <option value="review">In Review</option>
      <option value="completed">Completed</option>
    </select>
  </div>

  <table class="submissions-table">
    <thead>
      <tr>
        <th>Applicant</th>
        <th>Type</th>
        <th>Date</th>
        <th>Agent</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="submissionsBody">
      <!-- Rows injected by dashboard.js -->
    </tbody>
  </table>
</section>

  </main>

  <script src="ams.js"></script>
  <script src="dashboard.js"></script>

</body>
</html>
