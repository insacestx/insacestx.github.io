<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACES AMS | Policies</title>
  <link rel="stylesheet" href="style-ams.css">
</head>

<body>
<aside class="sidebar">
    <div class="logo"><img src="/images/image2.png"></div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="clients.html">Clients</a>
      <a href="policies.html">Policies</a>
      <a href="cois.html" class="active">COIs</a>
      <a href="claims.html">Claims</a>
      <a href="tasks.html">Tasks</a>
      <a href="/ams/leads.html">Leads</a>
      <a href="agents.html">Agents</a>
      <a href="settings.html">Settings</a>
    </nav>
  </aside>

  <main class="content">
    <div class="page-header">
      <h1>Policies</h1>
      <button class="btn-red" onclick="addPolicy()">+ Add Policy</button>
    </div>

    <div class="search-bar">
      <input type="text" id="policySearch" placeholder="Search policies..." onkeyup="filterPolicies()">
    </div>

    <table class="data-table" id="policyTable">
      <thead>
        <tr>
          <th>Policy #</th>
          <th>Client</th>
          <th>Carrier</th>
          <th>Line</th>
          <th>Effective</th>
          <th>Renewal</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="policyRows"></tbody>
    </table>
  </main>

  <script src="ams.js"></script>
</body>
</html>
