<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACES AMS | Leads</title>
  <link rel="stylesheet" href="/ams/style-ams.css" />
  <script src="/ams/leads.js" defer></script>
  <style>
    .leads-container {
      margin-left: 240px;
      padding: 30px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .toolbar input,
    .toolbar select {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      min-width: 190px;
    }

    .leads-table-wrap {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: top;
    }

    th {
      background: #fafafa;
      font-weight: 600;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-new { background: #e7f1ff; color: #1d4ed8; }
    .status-contacted { background: #fff4e5; color: #9a3412; }
    .status-quoted { background: #ecfdf3; color: #166534; }
    .status-closed { background: #f3f4f6; color: #374151; }

    .notes {
      width: 100%;
      min-height: 44px;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px;
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
      background: #fff;
    }

    .action-select {
      width: 100%;
      min-width: 140px;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
    }

    .btn-row {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-red {
      background: #d40000;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-red:hover { background: #a30000; }

    .btn-light {
      background: #fff;
      color: #111;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
    }

    .empty {
      padding: 20px;
      color: #666;
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="logo"><img src="/images/image2.png"></div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="clients.html">Clients</a>
      <a href="policies.html">Policies</a>
      <a href="cois.html" class="active">COIs</a>
      <a href="claims.html">Claims</a>
      <a href="tasks.html">Tasks</a>
      <a href="/ams/leads.html">Leads</a>
      <a href="agents.html">Agents</a>
      <a href="settings.html">Settings</a>
    </nav>
  </aside>

  <main class="leads-container">
    <h1 style="margin-top:0;color:#d40000;">Agent Leads</h1>

    <div class="toolbar">
      <input id="searchInput" type="text" placeholder="Search name, phone, email..." />
      <select id="statusFilter">
        <option value="all">All Statuses</option>
        <option value="new">New</option>
        <option value="contacted">Contacted</option>
        <option value="quoted">Quoted</option>
        <option value="closed">Closed</option>
      </select>
      <select id="agentFilter">
        <option value="all">All Agents</option>
      </select>
    </div>

    <div class="leads-table-wrap">
      <table>
        <thead>
          <tr>
            <th>Lead</th>
            <th>Assigned Agent</th>
            <th>Status</th>
            <th>Notes</th>
            <th>Updated</th>
          </tr>
        </thead>
        <tbody id="leadRows"></tbody>
      </table>
      <div id="emptyState" class="empty" style="display:none;">No leads match current filters.</div>
    </div>

    <div class="btn-row">
      <button class="btn-red" id="addLeadBtn">+ Add Lead</button>
      <button class="btn-light" id="exportBtn">Export JSON</button>
    </div>
  </main>
</body>
</html>
