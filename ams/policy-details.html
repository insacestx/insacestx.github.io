<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACES AMS | Policy Details</title>
  <link rel="stylesheet" href="style-ams.css">
</head>

<body>
  <aside class="sidebar">
    <div class="logo"><img src="/images/image2.png"></div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="clients.html">Clients</a>
      <a href="policies.html" class="active">Policies</a>
      <a href="cois.html">COIs</a>
      <a href="claims.html">Claims</a>
      <a href="tasks.html">Tasks</a>
      <a href="agents.html">Agents</a>
      <a href="settings.html">Settings</a>
    </nav>
  </aside>

  <main class="content">
    <div class="page-header">
      <h1 id="policyNumber">Policy Details</h1>
      <button class="btn-red" onclick="editPolicy()">Edit</button>
    </div>

    <section class="client-info">
      <h2>Policy Information</h2>
      <p><strong>Client:</strong> <span id="policyClient"></span></p>
      <p><strong>Carrier:</strong> <span id="policyCarrier"></span></p>
      <p><strong>Line of Business:</strong> <span id="policyLine"></span></p>
      <p><strong>Effective Date:</strong> <span id="policyEffective"></span></p>
      <p><strong>Renewal Date:</strong> <span id="policyRenewal"></span></p>
      <p><strong>Status:</strong> <span id="policyStatus"></span></p>
      <p><strong>Premium:</strong> <span id="policyPremium">$—</span></p>
    </section>

    <section class="client-section">
      <h2>COIs for This Policy</h2>
      <ul id="policyCOIs"></ul>
      <button class="btn-red small" onclick="addCOI()">+ Add COI</button>
    </section>

    <section class="client-section">
      <h2>Claims for This Policy</h2>
      <ul id="policyClaims"></ul>
      <button class="btn-red small" onclick="addClaim()">+ Add Claim</button>
    </section>

    <section class="client-section">
      <h2>Endorsements</h2>
      <ul id="endorsementList"></ul>
      <button class="btn-red small" onclick="addEndorsement()">+ Add Endorsement</button>
    </section>

    <section class="client-section">
      <h2>Notes</h2>
      <textarea id="policyNotes" placeholder="Add internal notes..."></textarea>
      <button class="btn-red small" onclick="savePolicyNotes()">Save Notes</button>
    </section>

    <section class="client-section">
      <h2>Documents</h2>
      <input type="file" id="policyDocUpload" multiple>
      <button class="btn-red small" onclick="uploadPolicyDocs()">Upload</button>
      <ul id="policyDocs"></ul>
    </section>

  </main>

  <script src="ams.js"></script>
</body>
</html>
