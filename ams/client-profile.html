<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACES AMS | Client Profile</title>
  <link rel="stylesheet" href="style-ams.css">
</head>

<body>
  <aside class="sidebar">
    <div class="logo"><img src="/images/image2.png"></div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="clients.html" class="active">Clients</a>
      <a href="policies.html">Policies</a>
      <a href="cois.html">COIs</a>
      <a href="claims.html">Claims</a>
      <a href="tasks.html">Tasks</a>
      <a href="agents.html">Agents</a>
      <a href="settings.html">Settings</a>
    </nav>
  </aside>

  <main class="content">
    <div class="page-header">
      <h1 id="clientName">Client Profile</h1>
      <button class="btn-red" onclick="editClient()">Edit</button>
    </div>

    <section class="client-info">
      <h2>Contact Information</h2>
      <p><strong>Phone:</strong> <span id="clientPhone"></span></p>
      <p><strong>Email:</strong> <span id="clientEmail"></span></p>
      <p><strong>Assigned Agent:</strong> <span id="clientAgent"></span></p>
    </section>

    <section class="client-section">
      <h2>Policies</h2>
      <ul id="policyList"></ul>
      <button class="btn-red small" onclick="addPolicy()">+ Add Policy</button>
    </section>

    <section class="client-section">
      <h2>Certificates of Insurance</h2>
      <ul id="coiList"></ul>
      <button class="btn-red small" onclick="addCOI()">+ Add COI</button>
    </section>

    <section class="client-section">
      <h2>Claims</h2>
      <ul id="claimList"></ul>
      <button class="btn-red small" onclick="addClaim()">+ Add Claim</button>
    </section>

    <section class="client-section">
      <h2>Notes</h2>
      <textarea id="clientNotes" placeholder="Add internal notes..."></textarea>
      <button class="btn-red small" onclick="saveNotes()">Save Notes</button>
    </section>

    <section class="client-section">
      <h2>Documents</h2>
      <input type="file" id="docUpload" multiple>
      <button class="btn-red small" onclick="uploadDocs()">Upload</button>
      <ul id="docList"></ul>
    </section>

  </main>

  <script src="ams.js"></script>
</body>
</html>
