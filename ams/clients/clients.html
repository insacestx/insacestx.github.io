<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACES AMS | Clients</title>

  <!-- Global site styles + AMS styles -->
  <link rel="stylesheet" href="../../style.css" />
  <link rel="stylesheet" href="../style-ams.css" />

  <!-- Global header/footer logic + AMS core logic -->
  <script src="../../global.js" defer></script>
  <script src="../ams.js" defer></script>
</head>

<body>
  <header id="aces-header"></header>

  <div class="ams-app">
    <aside class="sidebar">
      <div class="logo">
        <a href="../dashboard/dashboard.html" class="logo-link" aria-label="ACES Home">
          <img src="../../images/image2.png" alt="ACES Insurance Logo" class="aces-logo" />
        </a>
      </div>

      <nav aria-label="AMS navigation">
        <a href="../dashboard/dashboard.html">Dashboard</a>
        <a href="clients.html" class="active" aria-current="page">Clients</a>
        <a href="../policies/policies.html">Policies</a>
        <a href="../cois/cois.html">COIs</a>
        <a href="../claims/claims.html">Claims</a>
        <a href="../tasks/tasks.html">Tasks</a>
        <a href="../leads.html">Leads</a>
        <a href="../agents/agents.html">Agents</a>
        <a href="../settings/settings.html">Settings</a>
        <a href="#" id="logoutLink">Logout</a>
      </nav>
    </aside>

    <main class="content" role="main">
      <div class="page-header">
        <h1>Clients</h1>
        <button id="addClientBtn" class="btn-red" type="button" onclick="openAddClient()">+ Add Client</button>
      </div>

      <section class="search-bar" aria-label="Search clients">
        <label for="clientSearch" class="sr-only">Search clients</label>
        <input
          id="clientSearch"
          type="text"
          placeholder="Search clients by name, phone, email, or agent..."
          autocomplete="off"
        />
      </section>

      <section class="client-section" aria-label="Clients table">
        <table class="data-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Policies</th>
              <th>Agent</th>
            </tr>
          </thead>
          <tbody id="clientRows">
            <!-- Rows injected by ams.js (loadClients) -->
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <footer id="aces-footer"></footer>
</body>
</html>
