<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACES AMS | Client Profile</title>

  <link rel="stylesheet" href="../../style.css" />
  <link rel="stylesheet" href="../style-ams.css" />

  <script src="../../global.js" defer></script>
  <script src="../ams.js" defer></script>
</head>
<body>
  <header id="aces-header"></header>

  <div class="ams-app">
    <aside class="sidebar">
      <div class="logo">
        <a href="../dashboard/dashboard.html" class="logo-link" aria-label="ACES Home">
          <img src="../../images/image2.png" alt="ACES Insurance Logo" class="aces-logo" />
        </a>
      </div>

      <nav aria-label="AMS navigation">
        <a href="../dashboard/dashboard.html">Dashboard</a>
        <a href="clients.html" class="active" aria-current="page">Clients</a>
        <a href="../policies/policies.html">Policies</a>
        <a href="../cois/cois.html">COIs</a>
        <a href="../claims/claims.html">Claims</a>
        <a href="../tasks/tasks.html">Tasks</a>
        <a href="../leads.html">Leads</a>
        <a href="../agents/agents.html">Agents</a>
        <a href="../settings/settings.html">Settings</a>
        <a href="#" id="logoutLink">Logout</a>
      </nav>
    </aside>

    <main class="content" role="main">
      <div class="page-header">
        <h1 id="clientName">Client Profile</h1>
        <button class="btn-red" type="button" onclick="editClient()">Edit Client</button>
      </div>

      <section class="client-info" aria-label="Client details">
        <h2>Client Information</h2>
        <p><strong>Phone:</strong> <span id="clientPhone">—</span></p>
        <p><strong>Email:</strong> <span id="clientEmail">—</span></p>
        <p><strong>Assigned Agent:</strong> <span id="clientAgent">—</span></p>
      </section>

      <section class="client-section" aria-label="Policies">
        <h2>Policies</h2>
        <ul id="policyList"></ul>
      </section>

      <section class="client-section" aria-label="COIs">
        <h2>COIs</h2>
        <ul id="coiList"></ul>
      </section>

      <section class="client-section" aria-label="Claims">
        <h2>Claims</h2>
        <ul id="claimList"></ul>
      </section>

      <section class="client-section" aria-label="Documents">
        <h2>Documents</h2>
        <ul id="docList"></ul>
        <button class="btn-red small" type="button" onclick="uploadDocs()">Upload Document</button>
      </section>

      <section class="client-section" aria-label="Notes">
        <h2>Notes</h2>
        <label for="clientNotes">Client Notes</label>
        <textarea id="clientNotes" placeholder="Add notes about this client..."></textarea>
        <button class="btn-red small" type="button" onclick="saveNotes()">Save Notes</button>
      </section>
    </main>
  </div>

  <footer id="aces-footer"></footer>
</body>
</html>
