<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title
    data-en="Client Portal | ACES Insurance Services"
    data-es="Portal del Cliente | ACES Insurance Services">
    Client Portal | ACES Insurance Services
  </title>

  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/wizard.css" />

  <script src="/global.js" defer></script>

  <style>
    .portal-container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 20px;
    }

    .portal-card {
      background: #fff;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      margin-bottom: 30px;
      animation: fadeUp 0.6s ease;
    }

    .portal-section-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 14px;
      color: #d32f2f;
    }

    .portal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .portal-field {
      background: #fafafa;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid #eee;
    }

    .portal-field label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
    }

    .portal-field p {
      margin-top: 6px;
      font-size: 1rem;
      color: #222;
    }

    .portal-actions {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .portal-actions a {
      padding: 14px 20px;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }

    .primary-btn {
      background: #d32f2f;
      color: #fff;
    }

    .secondary-btn {
      background: #f5f5f5;
      color: #333;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id") || sessionStorage.getItem("aces_quote_id") || "Unknown";

      document.getElementById("portal-id").textContent = id;

      // Simulated status (future API integration)
      const statuses = [
        "Received",
        "Assigned to Agent",
        "In Review",
        "Quoting Carriers",
        "Awaiting Documents",
        "Completed"
      ];

      const randomStatus = statuses[Math.floor(Math.random() * statuses.length)];
      document.getElementById("portal-status").textContent = randomStatus;

      // Simulated assigned agent
      const agents = [
        "George Santibañez",
        "Lanse Derrick",
        "Robert Hyde",
        "Bryan Carter",
        "Jimmy Rodriguez",
        "Renee Ridling"
      ];

      const assigned = agents[Math.floor(Math.random() * agents.length)];
      document.getElementById("portal-agent").textContent = assigned;
    });
  </script>
</head>

<body>

<header id="aces-header"></header>

<main class="fade-in">

  <!-- HERO SECTION -->
  <section class="quote-hero">
    <div class="quote-hero-inner">

      <div class="quote-hero-text">
        <h1
          data-en="Client Portal"
          data-es="Portal del Cliente">
          Client Portal
        </h1>

        <p
          data-en="View your quote status, upload documents, and contact your ACES agent."
          data-es="Vea el estado de su cotización, suba documentos y contacte a su agente de ACES.">
          View your quote status, upload documents, and contact your ACES agent.
        </p>
      </div>

      <div class="quote-hero-image"></div>

    </div>
  </section>

  <!-- PORTAL CONTENT -->
  <div class="portal-container">

    <!-- QUOTE SUMMARY -->
    <div class="portal-card">
      <h2 class="portal-section-title"
        data-en="Quote Summary"
        data-es="Resumen de la Cotización">
        Quote Summary
      </h2>

      <div class="portal-grid">
        <div class="portal-field">
          <label data-en="Quote ID" data-es="ID de Cotización">Quote ID</label>
          <p id="portal-id">—</p>
        </div>

        <div class="portal-field">
          <label data-en="Current Status" data-es="Estado Actual">Current Status</label>
          <p id="portal-status">—</p>
        </div>

        <div class="portal-field">
          <label data-en="Assigned Agent" data-es="Agente Asignado">Assigned Agent</label>
          <p id="portal-agent">—</p>
        </div>
      </div>

      <div class="portal-actions">
        <a href="/quote-status.html" class="secondary-btn">
          <span data-en="Check Status" data-es="Ver Estado">
            Check Status
          </span>
        </a>
      </div>
    </div>

    <!-- DOCUMENTS -->
    <div class="portal-card">
      <h2 class="portal-section-title"
        data-en="Documents"
        data-es="Documentos">
        Documents
      </h2>

      <p
        data-en="Upload any documents requested by your ACES agent."
        data-es="Suba cualquier documento solicitado por su agente de ACES.">
        Upload any documents requested by your ACES agent.
      </p>

      <div class="portal-actions">
        <a href="/documents-upload.html" class="primary-btn">
          <span data-en="Upload Documents" data-es="Subir Documentos">
            Upload Documents
          </span>
        </a>
      </div>
    </div>

    <!-- SUPPORT -->
    <div class="portal-card">
      <h2 class="portal-section-title"
        data-en="Support"
        data-es="Soporte">
        Support
      </h2>

      <p
        data-en="Need help? Our team is here for you."
        data-es="¿Necesita ayuda? Nuestro equipo está aquí para usted.">
        Need help? Our team is here for you.
      </p>

      <div class="portal-actions">
        <a href="/contact.html" class="secondary-btn">
          <span data-en="Contact Support" data-es="Contactar Soporte">
            Contact Support
          </span>
        </a>
      </div>
    </div>

  </div>

</main>

<footer id="aces-footer"></footer>

</body>
</html>
