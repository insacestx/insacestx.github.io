<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ACES Agent Login</title>

  <!-- Main ACES Styles -->
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="../../wizard.css">

  <!-- Login-specific styling -->
  <link rel="stylesheet" href="login.css">

  <!-- Global header/footer + login logic -->
  <script src="../../global.js" defer></script>
  <script src="login.js" defer></script>
</head>

<body>

<header id="aces-header"></header>

<main>
  <div class="login-wrapper">

    <h1>Agent Login</h1>
    <p>Access your ACES dashboard</p>

    <div class="login-field">
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" placeholder="agent@insaces.com">
    </div>

    <div class="login-field">
      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" placeholder="Enter password">
    </div>

    <button class="login-btn" id="loginSubmitBtn">Login</button>

    <div id="loginError" class="login-error" style="display:none;">
      Invalid email or password.
    </div>

  </div>
</main>

<footer id="aces-footer"></footer>

</body>
</html>
