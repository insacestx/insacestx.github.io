<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACES AMS Login</title>
  <meta name="robots" content="noindex,nofollow">

  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="login.css">

  <!-- Global header/footer injector -->
  <script src="../../global.js" defer></script>
  <!-- Login logic -->
  <script src="login.js" defer></script>
</head>

<body class="login-page">
  <header id="aces-header"></header>

  <main class="login-main" role="main">
    <div class="login-container">
      <section class="login-card" aria-label="Login form">
        <h1>ACES Agent Login</h1>

        <form id="loginForm" novalidate>
          <label class="sr-only" for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="Email" class="login-input" autocomplete="username" required>

          <label class="sr-only" for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Password" class="login-input" autocomplete="current-password" required>

          <button id="loginBtn" class="login-btn" type="submit">Login</button>
        </form>

        <p id="loginError" class="login-error" role="alert" aria-live="polite" hidden></p>

        <p class="login-note">
          Temporary login system — Google OAuth coming soon.
        </p>
      </section>
    </div>
  </main>

  <footer id="aces-footer"></footer>
</body>
</html>
