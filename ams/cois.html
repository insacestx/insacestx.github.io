<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACES AMS | COIs</title>
  <link rel="stylesheet" href="style-ams.css">
</head>

<body>
  <aside class="sidebar">
    <div class="logo"><img src="/images/image2.png"></div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="clients.html">Clients</a>
      <a href="policies.html">Policies</a>
      <a href="cois.html" class="active">COIs</a>
      <a href="claims.html">Claims</a>
      <a href="tasks.html">Tasks</a>
      <a href="agents.html">Agents</a>
      <a href="settings.html">Settings</a>
    </nav>
  </aside>

  <main class="content">
    <div class="page-header">
      <h1>Certificates of Insurance</h1>
      <button class="btn-red" onclick="addCOI()">+ Add COI</button>
    </div>

    <div class="search-bar">
      <input type="text" id="coiSearch" placeholder="Search COIs..." onkeyup="filterCOIs()">
    </div>

    <table class="data-table" id="coiTable">
      <thead>
        <tr>
          <th>COI ID</th>
          <th>Client</th>
          <th>Holder</th>
          <th>Policy #</th>
          <th>Requested</th>
          <th>Completed</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="coiRows"></tbody>
    </table>
  </main>

  <script src="ams.js"></script>
</body>
</html>
