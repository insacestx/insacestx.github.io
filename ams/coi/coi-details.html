<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACES AMS | COI Details</title>
  <link rel="stylesheet" href="style-ams.css">
</head>

<body>
  <aside class="sidebar">
    <div class="logo"><img src="/images/image2.png"></div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="clients.html">Clients</a>
      <a href="policies.html">Policies</a>
      <a href="cois.html" class="active">COIs</a>
      <a href="claims.html">Claims</a>
      <a href="tasks.html">Tasks</a>
      <a href="/ams/leads.html">Leads</a>
      <a href="agents.html">Agents</a>
      <a href="settings.html">Settings</a>
    </nav>
  </aside>

  <main class="content">
    <div class="page-header">
      <h1 id="coiId">COI Details</h1>
      <button class="btn-red" onclick="markCOICompleted()">Mark Completed</button>
    </div>

    <section class="client-info">
      <h2>COI Information</h2>
      <p><strong>Client:</strong> <span id="coiClient"></span></p>
      <p><strong>Holder:</strong> <span id="coiHolder"></span></p>
      <p><strong>Policy #:</strong> <span id="coiPolicy"></span></p>
      <p><strong>Date Requested:</strong> <span id="coiRequested"></span></p>
      <p><strong>Date Completed:</strong> <span id="coiCompleted"></span></p>
      <p><strong>Status:</strong> <span id="coiStatus"></span></p>
    </section>

    <section class="client-section">
      <h2>Notes</h2>
      <textarea id="coiNotes" placeholder="Add internal notes..."></textarea>
      <button class="btn-red small" onclick="saveCOINotes()">Save Notes</button>
    </section>

    <section class="client-section">
      <h2>Documents</h2>
      <input type="file" id="coiDocUpload" multiple>
      <button class="btn-red small" onclick="uploadCOIDocs()">Upload</button>
      <ul id="coiDocs"></ul>
    </section>

  </main>

  <script src="ams.js"></script>
</body>
</html>
