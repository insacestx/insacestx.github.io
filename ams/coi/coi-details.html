<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACES AMS | COI Details</title>

  <link rel="stylesheet" href="../../style.css" />
  <link rel="stylesheet" href="../style-ams.css" />

  <script src="../../global.js" defer></script>
  <script src="../ams.js" defer></script>
</head>
<body>
  <header id="aces-header"></header>

  <div class="ams-app">
    <aside class="sidebar">
      <div class="logo">
        <a href="../dashboard/dashboard.html" class="logo-link" aria-label="ACES Home">
          <img src="../../images/image2.png" alt="ACES Insurance Logo" class="aces-logo" />
        </a>
      </div>

      <nav aria-label="AMS navigation">
        <a href="../dashboard/dashboard.html">Dashboard</a>
        <a href="../clients/clients.html">Clients</a>
        <a href="../policies/policies.html">Policies</a>
        <a href="cois.html" class="active" aria-current="page">COIs</a>
        <a href="../claims/claims.html">Claims</a>
        <a href="../tasks/tasks.html">Tasks</a>
        <a href="../leads.html">Leads</a>
        <a href="../agents/agents.html">Agents</a>
        <a href="../settings/settings.html">Settings</a>
        <a href="#" id="logoutLink">Logout</a>
      </nav>
    </aside>

    <main class="content" role="main">
      <div class="page-header">
        <h1 id="coiId">COI Details</h1>
        <button class="btn-red" type="button" onclick="markCOICompleted()">Mark Completed</button>
      </div>

      <section class="client-info" aria-label="COI information">
        <h2>COI Information</h2>
        <p><strong>Client:</strong> <span id="coiClient">—</span></p>
        <p><strong>Holder:</strong> <span id="coiHolder">—</span></p>
        <p><strong>Policy #:</strong> <span id="coiPolicy">—</span></p>
        <p><strong>Date Requested:</strong> <span id="coiRequested">—</span></p>
        <p><strong>Date Completed:</strong> <span id="coiCompleted">—</span></p>
        <p><strong>Status:</strong> <span id="coiStatus">—</span></p>
      </section>

      <section class="client-section" aria-label="COI notes">
        <h2>Notes</h2>
        <label for="coiNotes">Internal Notes</label>
        <textarea id="coiNotes" placeholder="Add internal notes..."></textarea>
        <button class="btn-red small" type="button" onclick="saveCOINotes()">Save Notes</button>
      </section>

      <section class="client-section" aria-label="COI documents">
        <h2>Documents</h2>
        <input type="file" id="coiDocUpload" multiple />
        <button class="btn-red small" type="button" onclick="uploadCOIDocs()">Upload</button>
        <ul id="coiDocs"></ul>
      </section>
    </main>
  </div>

  <footer id="aces-footer"></footer>
</body>
</html>
