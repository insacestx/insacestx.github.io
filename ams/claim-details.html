<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACES AMS | Claim Details</title>
  <link rel="stylesheet" href="style-ams.css">
</head>

<body>
  <aside class="sidebar">
    <div class="logo"><img src="/images/image2.png"></div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="clients.html">Clients</a>
      <a href="policies.html">Policies</a>
      <a href="cois.html">COIs</a>
      <a href="claims.html" class="active">Claims</a>
      <a href="tasks.html">Tasks</a>
      <a href="agents.html">Agents</a>
      <a href="settings.html">Settings</a>
    </nav>
  </aside>

  <main class="content">
    <div class="page-header">
      <h1 id="claimId">Claim Details</h1>
      <button class="btn-red" onclick="closeClaim()">Close Claim</button>
    </div>

    <section class="client-info">
      <h2>Claim Information</h2>
      <p><strong>Client:</strong> <span id="claimClient"></span></p>
      <p><strong>Date of Loss:</strong> <span id="claimLoss"></span></p>
      <p><strong>Type:</strong> <span id="claimType"></span></p>
      <p><strong>Carrier:</strong> <span id="claimCarrier"></span></p>
      <p><strong>Status:</strong> <span id="claimStatus"></span></p>
    </section>

    <section class="client-section">
      <h2>Adjuster Information</h2>
      <p><strong>Name:</strong> <span id="adjusterName">—</span></p>
      <p><strong>Phone:</strong> <span id="adjusterPhone">—</span></p>
      <p><strong>Email:</strong> <span id="adjusterEmail">—</span></p>
      <button class="btn-red small" onclick="editAdjuster()">Edit Adjuster</button>
    </section>

    <section class="client-section">
      <h2>Notes</h2>
      <textarea id="claimNotes" placeholder="Add internal notes..."></textarea>
      <button class="btn-red small" onclick="saveClaimNotes()">Save Notes</button>
    </section>

    <section class="client-section">
      <h2>Documents</h2>
      <input type="file" id="claimDocUpload" multiple>
      <button class="btn-red small" onclick="uploadClaimDocs()">Upload</button>
      <ul id="claimDocs"></ul>
    </section>

  </main>

  <script src="ams.js"></script>
</body>
</html>
