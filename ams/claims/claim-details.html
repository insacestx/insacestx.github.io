<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACES AMS | Claim Details</title>

  <link rel="stylesheet" href="../../style.css" />
  <link rel="stylesheet" href="../style-ams.css" />

  <script src="../../global.js" defer></script>
  <script src="../ams.js" defer></script>
</head>
<body>
  <header id="aces-header"></header>

  <div class="ams-app">
    <aside class="sidebar">
      <div class="logo">
        <a href="../dashboard/dashboard.html" class="logo-link" aria-label="ACES Home">
          <img src="../../images/image2.png" alt="ACES Insurance Logo" class="aces-logo" />
        </a>
      </div>

      <nav aria-label="AMS navigation">
        <a href="../dashboard/dashboard.html">Dashboard</a>
        <a href="../clients/clients.html">Clients</a>
        <a href="../policies/policies.html">Policies</a>
        <a href="../coi/cois.html">COIs</a>
        <a href="claims.html" class="active" aria-current="page">Claims</a>
        <a href="../tasks/tasks.html">Tasks</a>
        <a href="../leads.html">Leads</a>
        <a href="../agents/agents.html">Agents</a>
        <a href="../settings/settings.html">Settings</a>
        <a href="#" id="logoutLink">Logout</a>
      </nav>
    </aside>

    <main class="content" role="main">
      <div class="page-header">
        <h1 id="claimId">Claim Details</h1>
        <button class="btn-red" type="button" onclick="closeClaim()">Close Claim</button>
      </div>

      <section class="client-info" aria-label="Claim information">
        <h2>Claim Information</h2>
        <p><strong>Client:</strong> <span id="claimClient">—</span></p>
        <p><strong>Date of Loss:</strong> <span id="claimLoss">—</span></p>
        <p><strong>Type:</strong> <span id="claimType">—</span></p>
        <p><strong>Carrier:</strong> <span id="claimCarrier">—</span></p>
        <p><strong>Status:</strong> <span id="claimStatus">—</span></p>
      </section>

      <section class="client-section" aria-label="Adjuster information">
        <h2>Adjuster Information</h2>
        <p><strong>Name:</strong> <span id="adjusterName">—</span></p>
        <p><strong>Phone:</strong> <span id="adjusterPhone">—</span></p>
        <p><strong>Email:</strong> <span id="adjusterEmail">—</span></p>
        <button class="btn-red small" type="button" onclick="editAdjuster()">Edit Adjuster</button>
      </section>

      <section class="client-section" aria-label="Claim notes">
        <h2>Notes</h2>
        <label for="claimNotes">Internal Notes</label>
        <textarea id="claimNotes" placeholder="Add internal notes..."></textarea>
        <button class="btn-red small" type="button" onclick="saveClaimNotes()">Save Notes</button>
      </section>

      <section class="client-section" aria-label="Claim documents">
        <h2>Documents</h2>
        <input type="file" id="claimDocUpload" multiple />
        <button class="btn-red small" type="button" onclick="uploadClaimDocs()">Upload</button>
        <ul id="claimDocs"></ul>
      </section>
    </main>
  </div>

  <footer id="aces-footer"></footer>
</body>
</html>
