<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACES AMS | Claims</title>
  <link rel="stylesheet" href="style-ams.css">
</head>

<body>
  <aside class="sidebar">
    <div class="logo"><img src="/images/image2.png"></div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="clients.html">Clients</a>
      <a href="policies.html">Policies</a>
      <a href="cois.html">COIs</a>
      <a href="claims.html" class="active">Claims</a>
      <a href="tasks.html">Tasks</a>
      <a href="agents.html">Agents</a>
      <a href="settings.html">Settings</a>
    </nav>
  </aside>

  <main class="content">
    <div class="page-header">
      <h1>Claims</h1>
      <button class="btn-red" onclick="addClaim()">+ Add Claim</button>
    </div>

    <div class="search-bar">
      <input type="text" id="claimSearch" placeholder="Search claims..." onkeyup="filterClaims()">
    </div>

    <table class="data-table" id="claimTable">
      <thead>
        <tr>
          <th>Claim ID</th>
          <th>Client</th>
          <th>Date of Loss</th>
          <th>Type</th>
          <th>Carrier</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="claimRows"></tbody>
    </table>
  </main>

  <script src="ams.js"></script>
</body>
</html>
