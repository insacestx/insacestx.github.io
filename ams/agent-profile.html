<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACES AMS | Agent Profile</title>
  <link rel="stylesheet" href="style-ams.css">
</head>

<body>
  <aside class="sidebar">
    <div class="logo"><img src="/images/image2.png"></div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="clients.html">Clients</a>
      <a href="policies.html">Policies</a>
      <a href="cois.html">COIs</a>
      <a href="claims.html">Claims</a>
      <a href="tasks.html">Tasks</a>
      <a href="agents.html" class="active">Agents</a>
      <a href="settings.html">Settings</a>
    </nav>
  </aside>

  <main class="content">
    <div class="page-header">
      <h1 id="agentName">Agent Profile</h1>
      <button class="btn-red" onclick="editAgent()">Edit</button>
    </div>

    <section class="client-info">
      <img id="agentPhoto" class="agent-profile-photo">
      <h2 id="agentTitle"></h2>
      <p><strong>Phone:</strong> <span id="agentPhone"></span></p>
      <p><strong>Email:</strong> <span id="agentEmail"></span></p>
    </section>

    <section class="client-section">
      <h2>Assigned Clients</h2>
      <ul id="agentClients"></ul>
    </section>

    <section class="client-section">
      <h2>Tasks</h2>
      <ul id="agentTasks"></ul>
    </section>

    <section class="client-section">
      <h2>Notes</h2>
      <textarea id="agentNotes" placeholder="Add internal notes..."></textarea>
      <button class="btn-red small" onclick="saveAgentNotes()">Save Notes</button>
    </section>

  </main>

  <script src="ams.js"></script>
</body>
</html>
