<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title
    data-en="Insurance Applications | ACES Insurance Services"
    data-es="Solicitudes de Seguro | ACES Insurance Services">
    Insurance Applications | ACES Insurance Services
  </title>

  <link rel="stylesheet" href="/applications/applications.css" />
  <link rel="stylesheet" href="/wizard.css" />
  <link rel="stylesheet" href="style.css">

  <script src="/global.js" defer></script>
  <script src="/applications/render-cards.js" defer></script>
  <script src="/applications/applications.js" defer></script>

  <style>
    /* Match the tighter spacing style used on services page */
    .apps-main {
      padding-top: 0;
    }

    .apps-hero {
      position: relative;
      background:
        linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)),
        url('Icons/hero-applications-aces.png') 72% 65% / contain no-repeat;
      background-color: #1a1a1a; /* fallback fill when using contain */

      min-height: 280px;          /* was visually taller */
      padding: 16px 0 12px;       /* tighter top/bottom spacing */

      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fff;
      margin-bottom: 6px;         /* pull controls closer */
    }

    .apps-hero-inner {
      max-width: 900px;
      padding: 0 20px;
    }

    .apps-hero h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      margin-bottom: 8px;
    }

    .apps-hero p {
      font-size: clamp(1rem, 2vw, 1.2rem);
      opacity: 0.95;
      margin-bottom: 0;
    }

    /* tighten spacing around filter/search controls */
    .apps-controls {
      margin-top: 0 !important;
      margin-bottom: 10px !important;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
    }

    /* tighten gap before cards start */
    #app-card-container.apps-grid {
      margin-top: 0 !important;
      padding-top: 0 !important;
    }
  </style>
</head>

<body>
  <header id="aces-header"></header>

  <main class="apps-main fade-in">
    <!-- HERO -->
    <section class="apps-hero">
      <div class="apps-hero-inner">
        <h1
          data-en="Start Your Insurance Application"
          data-es="Inicie su Solicitud de Seguro">
          Start Your Insurance Application
        </h1>
        <p
          data-en="Choose the type of coverage you need and complete a short, guided application."
          data-es="Elija el tipo de cobertura que necesita y complete una solicitud guiada y sencilla.">
          Choose the type of coverage you need and complete a short, guided application.
        </p>
      </div>
    </section>

    <!-- CONTROLS BAR -->
    <section class="apps-controls">
      <div class="apps-filters">
        <button class="apps-filter-btn active" data-filter="all"
          data-en="All" data-es="Todos">All</button>
        <button class="apps-filter-btn" data-filter="personal"
          data-en="Personal" data-es="Personal">Personal</button>
        <button class="apps-filter-btn" data-filter="commercial"
          data-en="Commercial" data-es="Comercial">Commercial</button>
        <button class="apps-filter-btn" data-filter="life"
          data-en="Life & Family" data-es="Vida y Familia">Life & Family</button>
      </div>

      <div class="apps-search">
        <input
          id="appSearch"
          type="text"
          placeholder="Search applications / Buscar aplicaciones" />
      </div>
    </section>

    <!-- DYNAMIC APPLICATION CARDS -->
    <section id="app-card-container" class="apps-grid"></section>
  </main>

  <footer id="aces-footer"></footer>
</body>
</html>
