<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title
    data-en="Upload Documents | ACES Insurance Services"
    data-es="Subir Documentos | ACES Insurance Services">
    Upload Documents | ACES Insurance Services
  </title>

  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/wizard.css" />

  <script src="/global.js" defer></script>

  <style>
    .upload-container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    .upload-card {
      background: #fff;
      padding: 40px;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      animation: fadeUp 0.6s ease;
      text-align: center;
    }

    .drop-zone {
      border: 2px dashed #d32f2f;
      padding: 40px;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .drop-zone:hover {
      background: #fff5f5;
    }

    .drop-zone p {
      margin-top: 10px;
      font-size: 1rem;
      color: #555;
    }

    .file-list {
      margin-top: 20px;
      text-align: left;
    }

    .file-item {
      padding: 10px 14px;
      background: #fafafa;
      border-radius: 8px;
      border: 1px solid #eee;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .upload-actions {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .upload-actions a,
    .upload-actions button {
      padding: 14px 20px;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
      cursor: pointer;
      border: none;
    }

    .primary-btn {
      background: #d32f2f;
      color: #fff;
    }

    .secondary-btn {
      background: #f5f5f5;
      color: #333;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id") || sessionStorage.getItem("aces_quote_id") || "Unknown";

      document.getElementById("upload-id").textContent = id;

      const dropZone = document.getElementById("drop-zone");
      const fileInput = document.getElementById("file-input");
      const fileList = document.getElementById("file-list");

      dropZone.addEventListener("click", () => fileInput.click());

      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.style.background = "#fff5f5";
      });

      dropZone.addEventListener("dragleave", () => {
        dropZone.style.background = "transparent";
      });

      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.style.background = "transparent";
        handleFiles(e.dataTransfer.files);
      });

      fileInput.addEventListener("change", () => {
        handleFiles(fileInput.files);
      });

      function handleFiles(files) {
        for (let file of files) {
          const item = document.createElement("div");
          item.className = "file-item";
          item.innerHTML = `
            <span>${file.name}</span>
            <span>${(file.size / 1024).toFixed(1)} KB</span>
          `;
          fileList.appendChild(item);
        }
      }
    });
  </script>
</head>

<body>

<header id="aces-header"></header>

<main class="fade-in">

  <!-- HERO SECTION -->
  <section class="quote-hero">
    <div class="quote-hero-inner">

      <div class="quote-hero-text">
        <h1
          data-en="Upload Documents"
          data-es="Subir Documentos">
          Upload Documents
        </h1>

        <p
          data-en="Submit any documents requested by your ACES agent."
          data-es="Envíe los documentos solicitados por su agente de ACES.">
          Submit any documents requested by your ACES agent.
        </p>
      </div>

      <div class="quote-hero-image"></div>

    </div>
  </section>

  <!-- UPLOAD CARD -->
  <div class="upload-container">
    <div class="upload-card">

      <h2
        data-en="Documents for Quote ID:"
        data-es="Documentos para ID de Cotización:">
        Documents for Quote ID:
      </h2>

      <p id="upload-id" style="font-weight:700; font-size:1.2rem;">—</p>

      <!-- DROP ZONE -->
      <div id="drop-zone" class="drop-zone">
        <strong data-en="Drag & Drop Files Here" data-es="Arrastre y Suelte Archivos Aquí">
          Drag & Drop Files Here
        </strong>
        <p data-en="or click to browse" data-es="o haga clic para buscar">
          or click to browse
        </p>
      </div>

      <input id="file-input" type="file" multiple style="display:none;" />

      <!-- FILE LIST -->
      <div id="file-list" class="file-list"></div>

      <!-- ACTIONS -->
      <div class="upload-actions">
        <button class="primary-btn">
          <span data-en="Upload Files" data-es="Subir Archivos">
            Upload Files
          </span>
        </button>

        <a href="/client-portal.html" class="secondary-btn">
          <span data-en="Go to Client Portal" data-es="Ir al Portal del Cliente">
            Go to Client Portal
          </span>
        </a>

        <a href="/contact.html" class="secondary-btn">
          <span data-en="Contact Support" data-es="Contactar Soporte">
            Contact Support
          </span>
        </a>
      </div>

    </div>
  </div>

</main>

<footer id="aces-footer"></footer>

</body>
</html>
