<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title data-en="Condo Insurance Application | ACES Insurance Services"
        data-es="Solicitud de Seguro de Condominio | ACES Insurance Services">
  Condo Insurance Application | ACES Insurance Services
</title>

<link rel="stylesheet" href="style.css">
<script src="global.js" defer></script>
<script src="application-condo.js" defer></script>

</head>
<body>

<header id="aces-header"></header>

<section class="small-hero condo-hero fade-in">
  <div class="small-hero-content">
    <h1 data-en="Condo Insurance Application"
        data-es="Solicitud de Seguro de Condominio">
      Condo Insurance Application
    </h1>
    <p data-en="Provide your information to receive a personalized condo insurance quote."
       data-es="Proporcione su información para recibir una cotización personalizada de seguro de condominio.">
      Provide your information to receive a personalized condo insurance quote.
    </p>
  </div>
</section>

<section class="app-section fade-in">

  <!-- STEP INDICATOR -->
  <div class="wizard-steps condo-wizard-steps">
    <div class="wizard-step active" data-step="1">
      <span class="wizard-step-icon">👤</span>
      <span data-en="Applicant" data-es="Solicitante">Applicant</span>
    </div>
    <div class="wizard-step" data-step="2">
      <span class="wizard-step-icon">🏢</span>
      <span data-en="Property" data-es="Propiedad">Property</span>
    </div>
    <div class="wizard-step" data-step="3">
      <span class="wizard-step-icon">🛡️</span>
      <span data-en="Coverage" data-es="Cobertura">Coverage</span>
    </div>
    <div class="wizard-step" data-step="4">
      <span class="wizard-step-icon">📄</span>
      <span data-en="Details" data-es="Detalles">Details</span>
    </div>
    <div class="wizard-step" data-step="5">
      <span class="wizard-step-icon">✔️</span>
      <span data-en="Submit" data-es="Enviar">Submit</span>
    </div>
  </div>

  <form id="condoApplicationForm"
        action="https://formsubmit.co/office@insaces.com"
        method="POST"
        enctype="multipart/form-data"
        class="app-form condo-app-form">

    <!-- Round Robin -->
    <input type="hidden" name="_to" id="rrEmail">
    <input type="hidden" name="_subject" value="New Condo Insurance Application - ACES">
    <input type="hidden" name="_template" value="table">
    <input type="text" name="_honey" style="display:none">

    <!-- STEP 1: APPLICANT INFO -->
    <div class="form-step active" data-step="1">

      <h2 data-en="Applicant Information" data-es="Información del Solicitante">
        Applicant Information
      </h2>

      <div class="form-grid">

        <div class="form-field">
          <label data-en="First Name" data-es="Nombre">First Name</label>
          <input type="text" name="first_name" required>
        </div>

        <div class="form-field">
          <label data-en="Last Name" data-es="Apellido">Last Name</label>
          <input type="text" name="last_name" required>
        </div>

        <div class="form-field">
          <label data-en="Date of Birth" data-es="Fecha de Nacimiento">Date of Birth</label>
          <input type="date" name="dob" required>
        </div>

        <div class="form-field">
          <label data-en="Email" data-es="Correo Electrónico">Email</label>
          <input type="email" name="email" required>
        </div>

        <div class="form-field">
          <label data-en="Phone Number" data-es="Número de Teléfono">Phone Number</label>
          <input type="tel" name="phone" required>
        </div>

      </div>

      <div class="wizard-nav">
        <button type="button" class="btn-primary next-step"
                data-next="2"
                data-en="Next: Property"
                data-es="Siguiente: Propiedad">
          Next: Property
        </button>
      </div>

    </div>

    <!-- STEP 2: PROPERTY INFO -->
    <div class="form-step" data-step="2">

      <h2 data-en="Property Information" data-es="Información de la Propiedad">
        Property Information
      </h2>

      <div class="form-grid">

        <div class="form-field">
          <label data-en="Condo Address" data-es="Dirección del Condominio">Condo Address</label>
          <input type="text" name="condo_address" required>
        </div>

        <div class="form-field">
          <label data-en="City" data-es="Ciudad">City</label>
          <input type="text" name="condo_city" required>
        </div>

        <div class="form-field">
          <label data-en="State" data-es="Estado">State</label>
          <input type="text" name="condo_state" required>
        </div>

        <div class="form-field">
          <label data-en="ZIP Code" data-es="Código Postal">ZIP Code</label>
          <input type="text" name="condo_zip" required>
        </div>
