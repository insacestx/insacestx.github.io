<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title
    data-en="Application Wizard | ACES Insurance Services"
    data-es="Asistente de Solicitud | ACES Insurance Services">
    Application Wizard | ACES Insurance Services
  </title>

  <!-- GLOBAL + WIZARD STYLES -->
  <link rel="stylesheet" href="/wizard.css" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/applications/applications.css" />

  <!-- GLOBAL LANGUAGE + NAV -->
  <script src="/global.js" defer></script>

  <!-- UNIVERSAL WIZARD ENGINE -->
  <script src="/wizard.js" type="module" defer></script>

  <style>
    /* Page wrapper */
    .wizard-page {
      min-height: 100vh;
      background: #f5f5f7;
      padding-bottom: 60px;
    }

    /* Hero */
    .wizard-hero {
      background: linear-gradient(135deg, #111827, #1f2937);
      color: #fff;
      padding: 60px 20px 40px;
      text-align: left;
    }

    .wizard-hero-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .wizard-hero h1 {
      font-size: 2.2rem;
      margin-bottom: 8px;
    }

    .wizard-hero p {
      font-size: 1.05rem;
      max-width: 600px;
      color: #e5e7eb;
    }

    /* Wizard container */
    #wizard-container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }

    /* Tabs */
    #wizard-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .wizard-tab {
      padding: 8px 16px;
      border-radius: 999px;
      background: #e5e7eb;
      color: #374151;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .wizard-tab.active {
      background: #111827;
      color: #fff;
    }

    /* Progress bar */
    .wizard-progress-wrap {
      width: 100%;
      height: 6px;
      background: #e5e7eb;
      border-radius: 999px;
      margin-bottom: 25px;
      overflow: hidden;
    }

    #wizard-progress {
      height: 100%;
      width: 0%;
      background: #111827;
      transition: width 0.25s ease;
    }
  </style>
</head>

<body>
  <header id="aces-header"></header>

  <main class="wizard-page fade-in">

    <!-- HERO -->
    <section class="wizard-hero">
      <div class="wizard-hero-inner">
        <h1
          data-en="Insurance Application Wizard"
          data-es="Asistente de Solicitud de Seguro">
          Insurance Application Wizard
        </h1>

        <p
          data-en="Complete each step to submit your application."
          data-es="Complete cada paso para enviar su solicitud.">
          Complete each step to submit your application.
        </p>
      </div>
    </section>

    <!-- PROGRESS BAR -->
    <div class="wizard-progress-wrap">
      <div id="wizard-progress"></div>
    </div>

    <!-- STEP TABS -->
    <div id="wizard-tabs"></div>

    <!-- WIZARD CONTENT -->
    <section id="wizard-container"></section>

  </main>

  <footer id="aces-footer"></footer>
</body>
</html>
