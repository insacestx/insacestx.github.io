<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title data-en="Cyber Liability Application | ACES Insurance Services"
        data-es="Solicitud de Seguro de Responsabilidad Cibernética | ACES Insurance Services">
  Cyber Liability Application | ACES Insurance Services
</title>

<link rel="stylesheet" href="style.css">
<script src="global.js" defer></script>
<script src="application-cyber.js" defer></script>

</head>
<body>

<header id="aces-header"></header>

<section class="small-hero cyber-hero fade-in">
  <div class="small-hero-content">
    <h1 data-en="Cyber Liability Application"
        data-es="Solicitud de Seguro de Responsabilidad Cibernética">
      Cyber Liability Application
    </h1>
    <p data-en="Provide your business information to receive a cyber liability quote."
       data-es="Proporcione la información de su negocio para recibir una cotización de seguro cibernético.">
      Provide your business information to receive a cyber liability quote.
    </p>
  </div>
</section>

<section class="app-section fade-in">

  <!-- STEP INDICATOR -->
  <div class="wizard-steps cyber-wizard-steps">
    <div class="wizard-step active" data-step="1">
      <span class="wizard-step-icon">🏢</span>
      <span data-en="Business" data-es="Negocio">Business</span>
    </div>
    <div class="wizard-step" data-step="2">
      <span class="wizard-step-icon">💻</span>
      <span data-en="Technology" data-es="Tecnología">Technology</span>
    </div>
    <div class="wizard-step" data-step="3">
      <span class="wizard-step-icon">🔐</span>
      <span data-en="Security" data-es="Seguridad">Security</span>
    </div>
    <div class="wizard-step" data-step="4">
      <span class="wizard-step-icon">🛡️</span>
      <span data-en="Coverage" data-es="Cobertura">Coverage</span>
    </div>
    <div class="wizard-step" data-step="5">
      <span class="wizard-step-icon">✔️</span>
      <span data-en="Submit" data-es="Enviar">Submit</span>
    </div>
  </div>

  <form id="cyberApplicationForm"
        action="https://formsubmit.co/office@insaces.com"
        method="POST"
        enctype="multipart/form-data"
        class="app-form cyber-app-form">

    <!-- Round Robin -->
    <input type="hidden" name="_to" id="rrEmail">
    <input type="hidden" name="_subject" value="New Cyber Liability Application - ACES">
    <input type="hidden" name="_template" value="table">
    <input type="text" name="_honey" style="display:none">

    <!-- STEP 1: BUSINESS INFO -->
    <div class="form-step active" data-step="1">

      <h2 data-en="Business Information" data-es="Información del Negocio">
        Business Information
      </h2>

      <div class="form-grid">

        <div class="form-field">
          <label data-en="Business Name" data-es="Nombre del Negocio">Business Name</label>
          <input type="text" name="business_name" required>
        </div>

        <div class="form-field">
          <label data-en="Business Address" data-es="Dirección del Negocio">Business Address</label>
          <input type="text" name="business_address" required>
        </div>

        <div class="form-field">
          <label data-en="City" data-es="Ciudad">City</label>
          <input type="text" name="business_city" required>
        </div>

        <div class="form-field">
          <label data-en="State" data-es="Estado">State</label>
          <input type="text" name="business_state" required>
        </div>

        <div class="form-field">
          <label data-en="ZIP Code" data-es="Código Postal">ZIP Code</label>
          <input type="text" name="business_zip" required>
        </div>

        <div class="form-field">
          <label data-en="Business Type" data-es="Tipo de Negocio">Business Type</label>
          <input type="text" name="business_type" required>
        </div>

        <div class="form-field">
          <label data-en="Years in Business" data-es="Años en el Negocio">Years in Business</label>
          <input type="number" name="years_in_business">
        </div>

      </div>

      <div class="wizard-nav">
        <button type="button" class="btn-primary next-step"
                data-next="2"
                data-en="Next: Technology"
                data-es="Siguiente: Tecnología">
          Next: Technology
        </button>
      </div>

    </div>

    <!-- STEP 2: TECHNOLOGY -->
    <div class="form-step" data-step="2">

      <h2 data-en="Technology Use" data-es="Uso de Tecnología">
        Technology Use
      </h2>

      <div class="form-field">
        <label data-en="Describe the technology your business uses"
               data-es="Describa la tecnología que utiliza su negocio">
          Describe the technology your business uses
        </label>
        <textarea name="technology" rows="4"></textarea>
      </div>

      <div class="form-field">
        <label data-en="Do you store customer data?"
               data-es="¿Almacena datos de clientes?">
          Do you store customer data?
        </label>
        <select name="store_data">
          <option value="">Select...</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
          <option value="Unsure">Unsure</option>
        </select>
      </div>

      <div class="form-field">
        <label data-en="Do you process payments?"
               data-es="¿Procesa pagos?">
          Do you process payments?
        </label>
        <select name="process_payments">
          <option value="">Select...</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
          <option value="Unsure">Unsure</option>
        </select>
      </div>

      <div class="wizard-nav">
        <button type="button" class="btn-secondary prev-step"
                data-prev="1"
                data-en="Back"
                data-es="Atrás">
          Back
        </button>
        <button type="button" class="btn-primary next-step"
                data-next="3"
                data-en="Next: Security"
                data-es="Siguiente: Seguridad">
          Next: Security
        </button>
      </div>

    </div>

    <!-- STEP 3: SECURITY -->
    <div class="form-step" data-step="3">

      <h2 data-en="Cybersecurity Practices" data-es="Prácticas de Ciberseguridad">
        Cybersecurity Practices
      </h2>

      <div class="form-field">
        <label data-en="Do you use antivirus or endpoint protection?"
               data-es="¿Utiliza antivirus o protección de endpoint?">
          Do you use antivirus or endpoint protection?
        </label>
        <select name="antivirus">
          <option value="">Select...</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
          <option value="Unsure">Unsure</option>
        </select>
      </div>

      <div class="form-field">
        <label data-en="Do you use multi-factor authentication (MFA)?"
               data-es="¿Utiliza autenticación multifactor (MFA)?">
          Do you use multi-factor authentication (MFA)?
        </label>
        <select name="mfa">
          <option value="">Select...</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
          <option value="Unsure">Unsure</option>
        </select>
      </div>

      <div class="form-field">
        <label data-en="Any prior cyber incidents?"
               data-es="¿Algún incidente cibernético previo?">
          Any prior cyber incidents?
        </label>
        <textarea name="prior_incidents" rows="3"></textarea>
      </div>

      <div class="wizard-nav">
        <button type="button" class="btn-secondary prev-step"
                data-prev="2"
                data-en="Back"
                data-es="Atrás">
          Back
        </button>
        <button type="button" class="btn-primary next-step"
                data-next="4"
                data-en="Next: Coverage"
                data-es="Siguiente: Cobertura">
          Next: Coverage
        </button>
      </div>

    </div>

    <!-- STEP 4: COVERAGE -->
    <div class="form-step" data-step="4">

      <h2 data-en="Coverage Options" data-es="Opciones de Cobertura">
        Coverage Options
      </h2>

      <div class="form-grid">

        <div class="form-field">
          <label data-en="Cyber Liability Limit"
                 data-es="Límite de Responsabilidad Cibernética">
            Cyber Liability Limit
          </label>
          <select name="cyber_limit">
            <option value="">Select...</option>
            <option value="250000">$250,000</option>
            <option value="500000">$500,000</option>
            <option value="1000000">$1,000,000</option>
            <option value="2000000">$2,000,000</option>
            <option value="Unsure">Unsure</option>
          </select>
        </div>

        <div class="form-field">
          <label data-en="Data Breach Coverage"
                 data-es="Cobertura de Violación de Datos">
            Data Breach Coverage
          </label>
          <select name="data_breach">
            <option value="">Select...</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
            <option value="Unsure">Unsure</option>
          </select>
        </div>

      </div>

      <div class="wizard-nav">
        <button type="button" class="btn-secondary prev-step"
                data-prev="3"
                data-en="Back"
                data-es="Atrás">
          Back
        </button>
        <button type="button" class="btn-primary next-step"
                data-next="5"
                data-en="Next: Submit"
                data-es="Siguiente: Enviar">
          Next: Submit
        </button>
      </div>

    </div>

    <!-- STEP 5: SUBMIT -->
    <div class="form-step" data-step="5">

      <h2 data-en="Submit Application" data-es="Enviar Solicitud">
        Submit Application
      </h2>

      <div class="form-field">
        <label data-en="Upload Documents (Optional)"
               data-es="Cargar Documentos (Opcional)">
          Upload Documents (Optional)
        </label>
        <input type="file" name="documents" multiple>
      </div>

      <div class="form-field checkbox-field">
        <label>
          <input type="checkbox" name="consent" required>
          <span data-en="I confirm the information provided is accurate."
                data-es="Confirmo que la información proporcionada es correcta.">
            I confirm the information provided is accurate.
          </span>
        </label>
      </div>

      <div class="wizard-nav">
        <button type="button" class="btn-secondary prev-step"
                data-prev="4"
                data-en="Back"
                data-es="Atrás">
          Back
        </button>
        <button type="submit" class="btn-primary"
                data-en="Submit Application"
                data-es="Enviar Solicitud">
          Submit Application
        </button>
      </div>

    </div>

  </form>

</section>

<footer id="aces-footer"></footer>

</body>
</html>
