<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title

    data-es="Testimonios de Clientes | ACES Insurance Services"

  <meta
    name="description"

  <link rel="canonical" href="https://www.acesinsurancetx.com/testimonials.html" />
  <meta name="robots" content="index,follow" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Client Testimonials | ACES Insurance Services" />

    property="og:description"
    content="See what Texas clients say about ACES Insurance Services and share your review on Google."

  <meta property="og:url" content="https://www.acesinsurancetx.com/testimonials.html" />

  <meta name="twitter:card" content="summary" />

    content="Read real reviews from real Texas clients of ACES Insurance Services."

  <link rel="stylesheet" href="style.css" />

<body>
  <header id="aces-header"></header>

  <main id="main-content">
    <section class="testimonials-hero fade-in" aria-labelledby="testimonials-title">
      <h1
        id="testimonials-title"
        data-en="What Our Clients Are Saying"
        data-es="Lo Que Dicen Nuestros Clientes"
      >
        What Our Clients Are Saying
      </h1>

      <p
        data-en="Real reviews from Texans who trust ACES Insurance Services for reliable, bilingual insurance support."
        data-es="Reseñas reales de tejanos que confían en ACES Insurance Services para recibir apoyo de seguros confiable y bilingüe."
      >
        Real reviews from Texans who trust ACES Insurance Services for reliable, bilingual insurance support.
      </p>

      <div class="leave-review-wrap leave-review-wrap--top">
        <a
          href="https://g.page/r/CZzW0Z0n0eHPEBM/review"
          target="_blank"
          rel="noopener noreferrer"
          class="leave-review-btn"
          aria-label="Leave a review for ACES Insurance Services on Google (opens in a new tab)"
          data-en="Leave a Review on Google"
          data-es="Dejar una Reseña en Google"
        >
          Leave a Review on Google
        </a>
      </div>
    </section>

    <section class="testimonials-container fade-in" aria-labelledby="live-reviews-heading">
      <section class="testimonials-live fade-in">
        <h2
          id="live-reviews-heading"
          data-en="Live Google Reviews"
          data-es="Reseñas en Vivo de Google"
        >
          Live Google Reviews
        </h2>

        <div
          id="google-reviews-widget"
          role="region"
          aria-label="Google Reviews feed for ACES Insurance Services"
        >
          <div class="sk-ww-google-reviews" data-embed-id="25695742"></div>
        </div>
      </section>

      <div class="leave-review-wrap leave-review-wrap--bottom">
        <a
          href="https://g.page/r/CZzW0Z0n0eHPEBM/review"
          target="_blank"
          rel="noopener noreferrer"
          class="leave-review-btn"
          aria-label="Leave a review for ACES Insurance Services on Google (opens in a new tab)"
          data-en="Leave a Review on Google"
          data-es="Dejar una Reseña en Google"
        >
          Leave a Review on Google
        </a>
      </div>
    </section>
  </main>

  <footer id="aces-footer"></footer>

  <script src="https://widgets.sociablekit.com/google-reviews/widget.js" defer></script>
