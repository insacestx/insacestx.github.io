<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Commercial Auto Application | ACES Insurance Services</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <!-- Global header/footer + language toggle -->
  <script src="global.js" defer></script>

  <!-- Page-specific logic -->
  <script src="application-commercial-auto.js" defer></script>
</head>

<body class="dark-theme">

  <!-- Header injected by global.js -->
  <header id="aces-header"></header>

  <main id="main-content">

    <!-- HERO -->
    <section class="page-hero">
      <div class="page-hero-inner">
        <h1 data-en="Commercial Auto Application" data-es="Solicitud de Auto Comercial">
          Commercial Auto Application
        </h1>
        <p data-en="A quick application to help us insure your business vehicles."
           data-es="Una solicitud rápida para ayudarle a asegurar los vehículos de su negocio.">
          A quick application to help us insure your business vehicles.
        </p>
      </div>
    </section>

    <!-- FORM SECTION -->
    <section class="form-section">
      <div class="form-container">

        <!-- BUSINESS INFO -->
        <h2 data-en="Business Information" data-es="Información del Negocio">Business Information</h2>

        <form id="commercialAutoForm">

          <div class="form-group">
            <label data-en="Business Name" data-es="Nombre del Negocio">Business Name</label>
            <input type="text" name="businessName" required>
          </div>

          <div class="form-group">
            <label data-en="Business Address" data-es="Dirección del Negocio">Business Address</label>
            <input type="text" name="businessAddress" required>
          </div>

          <div class="form-group">
            <label data-en="Business Type" data-es="Tipo de Negocio">Business Type</label>
            <select name="businessType" required>
              <option value="contractor" data-en="Contractor" data-es="Contratista">Contractor</option>
              <option value="delivery" data-en="Delivery" data-es="Entrega">Delivery</option>
              <option value="transport" data-en="Transport" data-es="Transporte">Transport</option>
              <option value="sales" data-en="Sales" data-es="Ventas">Sales</option>
              <option value="other" data-en="Other" data-es="Otro">Other</option>
            </select>
          </div>

          <!-- CONTACT INFO -->
          <h2 data-en="Contact Information" data-es="Información de Contacto">Contact Information</h2>

          <div class="form-group">
            <label data-en="Full Name" data-es="Nombre Completo">Full Name</label>
            <input type="text" name="fullName" required>
          </div>

          <div class="form-group">
            <label data-en="Phone Number" data-es="Número de Teléfono">Phone Number</label>
            <input type="tel" name="phone" required>
          </div>

          <div class="form-group">
            <label data-en="Email Address" data-es="Correo Electrónico">Email Address</label>
            <input type="email" name="email" required>
          </div>

          <!-- VEHICLE INFO -->
          <h2 data-en="Vehicle Information" data-es="Información del Vehículo">Vehicle Information</h2>

          <div class="form-group">
            <label data-en="Number of Vehicles" data-es="Número de Vehículos">Number of Vehicles</label>
            <select name="vehicleCount" required>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3-5">3 - 5</option>
              <option value="6-10">6 - 10</option>
              <option value="10plus">10+</option>
            </select>
          </div>

          <div class="form-group">
            <label data-en="Primary Vehicle Use" data-es="Uso Principal del Vehículo">
              Primary Vehicle Use
            </label>
            <select name="vehicleUse" required>
              <option value="service" data-en="Service" data-es="Servicio">Service</option>
              <option value="delivery" data-en="Delivery" data-es="Entrega">Delivery</option>
              <option value="transport" data-en="Transport" data-es="Transporte">Transport</option>
              <option value="sales" data-en="Sales" data-es="Ventas">Sales</option>
            </select>
          </div>

          <!-- DRIVERS -->
          <h2 data-en="Driver Information" data-es="Información del Conductor">Driver Information</h2>

          <div class="form-group">
            <label data-en="Number of Drivers" data-es="Número de Conductores">Number of Drivers</label>
            <select name="driverCount" required>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3-5">3 - 5</option>
              <option value="6-10">6 - 10</option>
              <option value="10plus">10+</option>
            </select>
          </div>

          <div class="form-group">
            <label data-en="Any drivers under 25?"
                   data-es="¿Algún conductor menor de 25 años?">
              Any drivers under 25?
            </label>
            <select name="under25">
              <option value="no" data-en="No" data-es="No">No</option>
              <option value="yes" data-en="Yes" data-es="Sí">Yes</option>
            </select>
          </div>

          <!-- COVERAGE -->
          <h2 data-en="Coverage Details" data-es="Detalles de Cobertura">Coverage Details</h2>

          <div class="form-group">
            <label data-en="Do you currently have commercial auto insurance?"
                   data-es="¿Actualmente tiene seguro de auto comercial?">
              Do you currently have commercial auto insurance?
            </label>
            <select name="currentPolicy">
              <option value="yes" data-en="Yes" data-es="Sí">Yes</option>
              <option value="no" data-en="No" data-es="No">No</option>
            </select>
          </div>

          <div class="form-group">
            <label data-en="What level of coverage are you looking for?"
                   data-es="¿Qué nivel de cobertura está buscando?">
              What level of coverage are you looking for?
            </label>
            <select name="coverageLevel">
              <option value="basic" data-en="Basic Liability" data-es="Responsabilidad Básica">Basic Liability</option>
              <option value="standard" data-en="Standard Coverage" data-es="Cobertura Estándar">Standard Coverage</option>
              <option value="full" data-en="Full Coverage" data-es="Cobertura Completa">Full Coverage</option>
            </select>
          </div>

          <!-- SUBMIT -->
          <button type="submit" class="btn-primary"
            data-en="Submit Application"
            data-es="Enviar Solicitud">
            Submit Application
          </button>

        </form>

      </div>
    </section>

  </main>

  <!-- Footer injected by global.js -->
  <footer id="aces-footer"></footer>

</body>
</html>
