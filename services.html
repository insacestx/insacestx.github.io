<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title data-en="Our Services | ACES Insurance Services"
         data-es="Nuestros Servicios | ACES Insurance Services">
    Our Services | ACES Insurance Services
  </title>

  <link rel="stylesheet" href="style.css" />
  <script src="global.js" defer></script>
  <script src="services.js" defer></script>
</head>
<body>
  <header id="aces-header"></header>

  <section class="services-hero fade-in">
    <div class="small-hero-content">
      <h1 data-en="Our Insurance Services" data-es="Nuestros Servicios de Seguros">
        Our Insurance Services
      </h1>
      <p data-en="Personalized coverage options for every need."
         data-es="Opciones de cobertura personalizadas para cada necesidad.">
        Personalized coverage options for every need.
      </p>
    </div>
  </section>

  <section class="services-filter-bar fade-in">
    <div class="services-filter-buttons">
      <button class="filter-btn active" data-filter="all" data-en="All" data-es="Todos">All</button>
      <button class="filter-btn" data-filter="personal" data-en="Personal" data-es="Personal">Personal</button>
      <button class="filter-btn" data-filter="commercial" data-en="Commercial" data-es="Comercial">Commercial</button>
      <button class="filter-btn" data-filter="life" data-en="Life" data-es="Vida">Life</button>
    </div>

    <input
      id="serviceSearch"
      type="text"
      class="services-search-input"
      placeholder="Search services / Buscar servicios" />
  </section>

  <!-- Dynamic output -->
  <main id="servicesRoot" class="subcategory-section fade-in"></main>

  <footer id="aces-footer"></footer>
</body>
</html>
