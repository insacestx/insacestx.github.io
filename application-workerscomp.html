<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workers Compensation Application | ACES Insurance Services</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <!-- Global header/footer + language toggle -->
  <script src="global.js" defer></script>

  <!-- Page-specific logic -->
  <script src="application-workerscomp.js" defer></script>
</head>

<body class="dark-theme">

  <!-- Header injected by global.js -->
  <header id="aces-header"></header>

  <main id="main-content">

    <!-- HERO -->
    <section class="page-hero">
      <div class="page-hero-inner">
        <h1 data-en="Workers Compensation Application" data-es="Solicitud de Compensación al Trabajador">
          Workers Compensation Application
        </h1>
        <p data-en="A quick application to help us find the right Workers Comp policy for your business."
           data-es="Una solicitud rápida para ayudarle a encontrar la póliza adecuada de Compensación al Trabajador.">
          A quick application to help us find the right Workers Comp policy for your business.
        </p>
      </div>
    </section>

    <!-- FORM SECTION -->
    <section class="form-section">
      <div class="form-container">

        <form id="workersCompForm">

          <!-- BUSINESS INFO -->
          <h2 data-en="Business Information" data-es="Información del Negocio">Business Information</h2>

          <div class="form-group">
            <label data-en="Business Name" data-es="Nombre del Negocio">Business Name</label>
            <input type="text" name="businessName" required>
          </div>

          <div class="form-group">
            <label data-en="Business Address" data-es="Dirección del Negocio">Business Address</label>
            <input type="text" name="businessAddress" required>
          </div>

          <div class="form-group">
            <label data-en="Type of Business" data-es="Tipo de Negocio">Type of Business</label>
            <input type="text" name="businessType" placeholder="Construction, Retail, Restaurant, etc." required>
          </div>

          <!-- CONTACT INFO -->
          <h2 data-en="Contact Information" data-es="Información de Contacto">Contact Information</h2>

          <div class="form-group">
            <label data-en="Full Name" data-es="Nombre Completo">Full Name</label>
            <input type="text" name="fullName" required>
          </div>

          <div class="form-group">
            <label data-en="Phone Number" data-es="Número de Teléfono">Phone Number</label>
            <input type="tel" name="phone" required>
          </div>

          <div class="form-group">
            <label data-en="Email Address" data-es="Correo Electrónico">Email Address</label>
            <input type="email" name="email" required>
          </div>

          <!-- PAYROLL INFO -->
          <h2 data-en="Payroll & Employees" data-es="Nómina y Empleados">Payroll & Employees</h2>

          <div class="form-group">
            <label data-en="Number of Employees" data-es="Número de Empleados">Number of Employees</label>
            <input type="number" name="employees" min="1" required>
          </div>

          <div class="form-group">
            <label data-en="Annual Payroll Estimate" data-es="Estimado de Nómina Anual">
              Annual Payroll Estimate
            </label>
            <select name="payroll" required>
              <option value="under50k" data-en="Under $50,000" data-es="Menos de $50,000">Under $50,000</option>
              <option value="50k-150k" data-en="$50,000 - $150,000" data-es="$50,000 - $150,000">$50,000 - $150,000</option>
              <option value="150k-300k" data-en="$150,000 - $300,000" data-es="$150,000 - $300,000">$150,000 - $300,000</option>
              <option value="300kplus" data-en="Over $300,000" data-es="Más de $300,000">Over $300,000</option>
            </select>
          </div>

          <div class="form-group">
            <label data-en="Describe the type of work performed"
                   data-es="Describa el tipo de trabajo realizado">
              Describe the type of work performed
            </label>
            <textarea name="workDescription" rows="3" required></textarea>
          </div>

          <!-- COVERAGE -->
          <h2 data-en="Coverage Details" data-es="Detalles de Cobertura">Coverage Details</h2>

          <div class="form-group">
            <label data-en="Do you currently have Workers Comp insurance?"
                   data-es="¿Actualmente tiene seguro de Compensación al Trabajador?">
              Do you currently have Workers Comp insurance?
            </label>
            <select name="currentPolicy">
              <option value="yes" data-en="Yes" data-es="Sí">Yes</option>
              <option value="no" data-en="No" data-es="No">No</option>
            </select>
          </div>

          <div class="form-group">
            <label data-en="Any claims in the last 3 years?"
                   data-es="¿Algún reclamo en los últimos 3 años?">
              Any claims in the last 3 years?
            </label>
            <select name="claims">
              <option value="none" data-en="No claims" data-es="Sin reclamos">No claims</option>
              <option value="minor" data-en="Minor Injury" data-es="Lesión Menor">Minor Injury</option>
              <option value="major" data-en="Major Injury" data-es="Lesión Grave">Major Injury</option>
            </select>
          </div>

          <!-- SUBMIT -->
          <button type="submit" class="btn-primary"
            data-en="Submit Application"
            data-es="Enviar Solicitud">
            Submit Application
          </button>

        </form>

      </div>
    </section>

  </main>

  <!-- Footer injected by global.js -->
  <footer id="aces-footer"></footer>

</body>
</html>
