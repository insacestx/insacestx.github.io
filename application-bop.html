<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title data-en="Business Owners Policy Application | ACES Insurance Services"
        data-es="Solicitud de Póliza para Dueños de Negocios | ACES Insurance Services">
  Business Owners Policy Application | ACES Insurance Services
</title>

<link rel="stylesheet" href="style.css">
<script src="global.js" defer></script>
<script src="application-bop.js" defer></script>

</head>
<body>

<header id="aces-header"></header>

<section class="small-hero bop-hero fade-in">
  <div class="small-hero-content">
    <h1 data-en="Business Owners Policy Application"
        data-es="Solicitud de Póliza para Dueños de Negocios">
      Business Owners Policy Application
    </h1>
    <p data-en="Provide your business information to receive a BOP quote."
       data-es="Proporcione la información de su negocio para recibir una cotización BOP.">
      Provide your business information to receive a BOP quote.
    </p>
  </div>
</section>

<section class="app-section fade-in">

  <!-- STEP INDICATOR -->
  <div class="wizard-steps bop-wizard-steps">
    <div class="wizard-step active" data-step="1">
      <span class="wizard-step-icon">🏢</span>
      <span data-en="Business" data-es="Negocio">Business</span>
    </div>
    <div class="wizard-step" data-step="2">
      <span class="wizard-step-icon">📦</span>
      <span data-en="Operations" data-es="Operaciones">Operations</span>
    </div>
    <div class="wizard-step" data-step="3">
      <span class="wizard-step-icon">💼</span>
      <span data-en="Property" data-es="Propiedad">Property</span>
    </div>
    <div class="wizard-step" data-step="4">
      <span class="wizard-step-icon">🛡️</span>
      <span data-en="Coverage" data-es="Cobertura">Coverage</span>
    </div>
    <div class="wizard-step" data-step="5">
      <span class="wizard-step-icon">✔️</span>
      <span data-en="Submit" data-es="Enviar">Submit</span>
    </div>
  </div>

  <form id="bopApplicationForm"
        action="https://formsubmit.co/office@insaces.com"
        method="POST"
        enctype="multipart/form-data"
        class="app-form bop-app-form">

    <!-- Round Robin -->
    <input type="hidden" name="_to" id="rrEmail">
    <input type="hidden" name="_subject" value="New BOP Application - ACES">
    <input type="hidden" name="_template" value="table">
    <input type="text" name="_honey" style="display:none">

    <!-- STEP 1: BUSINESS INFO -->
    <div class="form-step active" data-step="1">

      <h2 data-en="Business Information" data-es="Información del Negocio">
        Business Information
      </h2>

      <div class="form-grid">

        <div class="form-field">
          <label data-en="Business Name" data-es="Nombre del Negocio">Business Name</label>
          <input type="text" name="business_name" required>
        </div>

        <div class="form-field">
          <label data-en="Business Address" data-es="Dirección del Negocio">Business Address</label>
          <input type="text" name="business_address" required>
        </div>

        <div class="form-field">
          <label data-en="City" data-es="Ciudad">City</label>
          <input type="text" name="business_city" required>
        </div>

        <div class="form-field">
          <label data-en="State" data-es="Estado">State</label>
          <input type="text" name="business_state" required>
        </div>

        <div class="form-field">
          <label data-en="ZIP Code" data-es="Código Postal">ZIP Code</label>
          <input type="text" name="business_zip" required>
        </div>

        <div class="form-field">
          <label data-en="Business Type" data-es="Tipo de Negocio">Business Type</label>
          <input type="text" name="business_type" required>
        </div>

        <div class="form-field">
          <label data-en="Years in Business" data-es="Años en el Negocio">Years in Business</label>
          <input type="number" name="years_in_business">
        </div>

      </div>

      <div class="wizard-nav">
        <button type="button" class="btn-primary next-step"
                data-next="2"
                data-en="Next: Operations"
                data-es="Siguiente: Operaciones">
          Next: Operations
        </button>
      </div>

    </div>

    <!-- STEP 2: OPERATIONS -->
    <div class="form-step" data-step="2">

      <h2 data-en="Business Operations" data-es="Operaciones del Negocio">
        Business Operations
      </h2>

      <div class="form-field">
        <label data-en="Describe your business operations"
               data-es="Describa las operaciones de su negocio">
          Describe your business operations
        </label>
        <textarea name="operations" rows="4"></textarea>
      </div>

      <div class="form-field">
        <label data-en="Annual Revenue"
               data-es="Ingresos Anuales">
          Annual Revenue
        </label>
        <input type="number" name="annual_revenue">
      </div>

      <div class="form-field">
        <label data-en="Number of Employees"
               data-es="Número de Empleados">
          Number of Employees
        </label>
        <input type="number" name="employees">
      </div>

      <div class="wizard-nav">
        <button type="button" class="btn-secondary prev-step"
                data-prev="1"
                data-en="Back"
                data-es="Atrás">
          Back
        </button>
        <button type="button" class="btn-primary next-step"
                data-next="3"
                data-en="Next: Property"
                data-es="Siguiente: Propiedad">
          Next: Property
        </button>
      </div>

    </div>

    <!-- STEP 3: PROPERTY -->
    <div class="form-step" data-step="3">

      <h2 data-en="Business Property" data-es="Propiedad del Negocio">
        Business Property
      </h2>

      <div class="form-grid">

        <div class="form-field">
          <label data-en="Building Coverage Needed?"
                 data-es="¿Necesita Cobertura de Edificio?">
            Building Coverage Needed?
          </label>
          <select name="building_coverage">
            <option value="">Select...</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
            <option value="Unsure">Unsure</option>
          </select>
        </div>

        <div class="form-field">
          <label data-en="Business Personal Property Amount"
                 data-es="Monto de Propiedad Personal del Negocio">
            Business Personal Property Amount
          </label>
          <input type="number" name="bpp_amount">
        </div>

        <div class="form-field">
          <label data-en="Square Footage"
                 data-es="Pies Cuadrados">
            Square Footage
          </label>
          <input type="text" name="sqft">
        </div>

      </div>

      <div class="wizard-nav">
        <button type="button" class="btn-secondary prev-step"
                data-prev="2"
                data-en="Back"
                data-es="Atrás">
          Back
        </button>
        <button type="button" class="btn-primary next-step"
                data-next="4"
                data-en="Next: Coverage"
                data-es="Siguiente: Cobertura">
          Next: Coverage
        </button>
      </div>

    </div>

    <!-- STEP 4: COVERAGE -->
    <div class="form-step" data-step="4">

      <h2 data-en="Coverage Options" data-es="Opciones de Cobertura">
        Coverage Options
      </h2>

      <div class="form-grid">

        <div class="form-field">
          <label data-en="General Liability Limit"
                 data-es="Límite de Responsabilidad General">
            General Liability Limit
          </label>
          <select name="gl_limit">
            <option value="">Select...</option>
            <option value="300000">$300,000</option>
            <option value="500000">$500,000</option>
            <option value="1000000">$1,000,000</option>
            <option value="2000000">$2,000,000</option>
            <option value="Unsure">Unsure</option>
          </select>
        </div>

        <div class="form-field">
          <label data-en="Business Income Coverage"
                 data-es="Cobertura de Ingresos del Negocio">
            Business Income Coverage
          </label>
          <select name="business_income">
            <option value="">Select...</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
            <option value="Unsure">Unsure</option>
          </select>
        </div>

      </div>

      <div class="wizard-nav">
        <button type="button" class="btn-secondary prev-step"
                data-prev="3"
                data-en="Back"
                data-es="Atrás">
          Back
        </button>
        <button type="button" class="btn-primary next-step"
                data-next="5"
                data-en="Next: Submit"
                data-es="Siguiente: Enviar">
          Next: Submit
        </button>
      </div>

    </div>

    <!-- STEP 5: SUBMIT -->
    <div class="form-step" data-step="5">

      <h2 data-en="Submit Application" data-es="Enviar Solicitud">
        Submit Application
      </h2>

      <div class="form-field">
        <label data-en="Upload Documents (Optional)"
               data-es="Cargar Documentos (Opcional)">
          Upload Documents (Optional)
        </label>
        <input type="file" name="documents" multiple>
      </div>

      <div class="form-field checkbox-field">
        <label>
          <input type="checkbox" name="consent" required>
          <span data-en="I confirm the information provided is accurate."
                data-es="Confirmo que la información proporcionada es correcta.">
            I confirm the information provided is accurate.
          </span>
        </label>
      </div>

      <div class="wizard-nav">
        <button type="button" class="btn-secondary prev-step"
                data-prev="4"
                data-en="Back"
                data-es="Atrás">
          Back
        </button>
        <button type="submit" class="btn-primary"
                data-en="Submit Application"
                data-es="Enviar Solicitud">
          Submit Application
        </button>
      </div>

    </div>

  </form>

</section>

<footer id="aces-footer"></footer>

</body>
</html>
