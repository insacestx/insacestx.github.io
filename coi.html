<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COI Request - ACES Insurance Services</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>

<body>

<!-- 🔴 ACES GLOBAL HEADER -->
<header class="aces-header">
  <div class="header-inner">

    <!-- Logo -->
    <a href="index.html" class="header-logo">
      <img src="image2.png" alt="ACES Insurance Services Logo" class="header-logo-img">
    </a>

    <!-- Language toggle -->
    <label class="toggle-switch header-toggle">
      <input type="checkbox" id="langToggle" onclick="toggleLanguage()">
      <span class="slider"></span>
    </label>

    <!-- Desktop nav (cloned here) -->
    <nav id="navContainer" class="nav-menu"></nav>

    <!-- Mobile hamburger -->
    <button class="mobile-nav-toggle" id="mobileNavToggle" aria-label="Toggle navigation">
      ☰
    </button>

  </div>
</header>

<!-- PAGE CONTENT -->
<section class="about">
    <h2>Certificate of Insurance Request</h2>
    <p>Please use this page to request a Certificate of Insurance. A bilingual form will be added here soon.</p>
</section>

<!-- FOOTER -->
<footer class="footer">
    <img src="image2.png" alt="ACES Logo" class="footer-logo">
    <p>© 2026 ACES Insurance Services</p>
</footer>

<!-- MOBILE MENU SCRIPT -->
<script>
function toggleMobileMenu() {
    const menu = document.getElementById("mobileMenu");
    menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
}

function toggleMobileDropdown(button) {
    const content = button.nextElementSibling;
    content.style.display = (content.style.display === "block") ? "none" : "block";
}
</script>

</body>
</html>
