<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title data-en="Flood Insurance Application | ACES Insurance Services"
        data-es="Solicitud de Seguro contra Inundaciones | ACES Insurance Services">
  Flood Insurance Application | ACES Insurance Services
</title>

<link rel="stylesheet" href="style.css">
<script src="global.js" defer></script>
<script src="application-flood.js" defer></script>

</head>
<body>

<header id="aces-header"></header>

<section class="small-hero flood-hero fade-in">
  <div class="small-hero-content">
    <h1 data-en="Flood Insurance Application"
        data-es="Solicitud de Seguro contra Inundaciones">
      Flood Insurance Application
    </h1>
    <p data-en="Provide your information to receive a personalized flood insurance quote."
       data-es="Proporcione su información para recibir una cotización personalizada de seguro contra inundaciones.">
      Provide your information to receive a personalized flood insurance quote.
    </p>
  </div>
</section>

<section class="app-section fade-in">

  <!-- STEP INDICATOR -->
  <div class="wizard-steps flood-wizard-steps">
    <div class="wizard-step active" data-step="1">
      <span class="wizard-step-icon">👤</span>
      <span data-en="Applicant" data-es="Solicitante">Applicant</span>
    </div>
    <div class="wizard-step" data-step="2">
      <span class="wizard-step-icon">🏠</span>
      <span data-en="Property" data-es="Propiedad">Property</span>
    </div>
    <div class="wizard-step" data-step="3">
      <span class="wizard-step-icon">🌊</span>
      <span data-en="Flood Zone" data-es="Zona de Inundación">Flood Zone</span>
    </div>
    <div class="wizard-step" data-step="4">
      <span class="wizard-step-icon">📄</span>
      <span data-en="Details" data-es="Detalles">Details</span>
    </div>
    <div class="wizard-step" data-step="5">
      <span class="wizard-step-icon">✔️</span>
      <span data-en="Submit" data-es="Enviar">Submit</span>
    </div>
  </div>

  <form id="floodApplicationForm"
        action="https://formsubmit.co/office@insaces.com"
        method="POST"
        enctype="multipart/form-data"
        class="app-form flood-app-form">

    <!-- Round Robin -->
    <input type="hidden" name="_to" id="rrEmail">
    <input type="hidden" name="_subject" value="New Flood Insurance Application - ACES">
    <input type="hidden" name="_template" value="table">
    <input type="text" name="_honey" style="display:none">

    <!-- STEP 1: APPLICANT INFO -->
    <div class="form-step active" data-step="1">

      <h2 data-en="Applicant Information" data-es="Información del Solicitante">
        Applicant Information
      </h2>

      <div class="form-grid">

        <div class="form-field">
          <label data-en="First Name" data-es="Nombre">First Name</label>
          <input type="text" name="first_name" required>
        </div>

        <div class="form-field">
          <label data-en="Last Name" data-es="Apellido">Last Name</label>
          <input type="text" name="last_name" required>
        </div>

        <div class="form-field">
          <label data-en="Date of Birth" data-es="Fecha de Nacimiento">Date of Birth</label>
          <input type="date" name="dob" required>
        </div>

        <div class="form-field">
          <label data-en="Email" data-es="Correo Electrónico">Email</label>
          <input type="email" name="email" required>
        </div>

        <div class="form-field">
          <label data-en="Phone Number" data-es="Número de Teléfono">Phone Number</label>
          <input type="tel" name="phone" required>
        </div>

      </div>

      <div class="wizard-nav">
        <button type="button" class="btn-primary next-step"
                data-next="2"
                data-en="Next: Property"
                data-es="Siguiente: Propiedad">
          Next: Property
        </button>
      </div>

    </div>

    <!-- STEP 2: PROPERTY INFO -->
    <div class="form-step" data-step="2">

      <h2 data-en="Property Information" data-es="Información de la Propiedad">
        Property Information
      </h2>

      <div class="form-grid">

        <div class="form-field">
          <label data-en="Property Address" data-es="Dirección de la Propiedad">Property Address</label>
          <input type="text" name="property_address" required>
        </div>

        <div class="form-field">
          <label data-en="City" data-es="Ciudad">City</label>
          <input type="text" name="property_city" required>
        </div>

        <div class="form-field">
          <label data-en="State" data-es="Estado">State</label>
          <input type="text" name="property_state" required>
        </div>

        <div class="form-field">
          <label data-en="ZIP Code" data-es="Código Postal">ZIP Code</label>
          <input type="text" name="property_zip" required>
        </div>

        <div class="form-field">
          <label data-en="Year Built" data-es="Año de Construcción">Year Built</label>
          <input type="text" name="year_built">
        </div>

        <div class="form-field">
          <label data-en="Foundation Type" data-es="Tipo de Fundación">Foundation Type</label>
          <select name="foundation">
            <option value="">Select...</option>
            <option value="Slab">Slab</option>
            <option value="Pier & Beam">Pier & Beam</option>
            <option value="Basement">Basement</option>
          </select>
        </div>

      </div>

      <div class="wizard-nav">
        <button type="button" class="btn-secondary prev-step"
                data-prev="1"
                data-en="Back"
                data-es="Atrás">
          Back
        </button>
        <button type="button" class="btn-primary next-step"
                data-next="3"
                data-en="Next: Flood Zone"
                data-es="Siguiente: Zona de Inundación">
          Next: Flood Zone
        </button>
      </div>

    </div>

    <!-- STEP 3: FLOOD ZONE -->
    <div class="form-step" data-step="3">

      <h2 data-en="Flood Zone Information" data-es="Información de la Zona de Inundación">
        Flood Zone Information
      </h2>

      <div class="form-grid">

        <div class="form-field">
          <label data-en="Flood Zone (if known)"
                 data-es="Zona de Inundación (si la conoce)">
            Flood Zone (if known)
          </label>
          <select name="flood_zone">
            <option value="">Select...</option>
            <option value="X">Zone X (Low Risk)</option>
            <option value="A">Zone A</option>
            <option value="AE">Zone AE</option>
            <option value="VE">Zone VE (Coastal)</option>
            <option value="Unknown">Unknown</option>
          </select>
        </div>

        <div class="form-field">
          <label data-en="Elevation Certificate Available?"
                 data-es="¿Certificado de Elevación Disponible?">
            Elevation Certificate Available?
          </label>
          <select name="elevation_cert">
            <option value="">Select...</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
            <option value="Unsure">Unsure</option>
          </select>
        </div>

      </div>

      <div class="wizard-nav">
        <button type="button" class="btn-secondary prev-step"
                data-prev="2"
                data-en="Back"
                data-es="Atrás">
          Back
        </button>
        <button type="button" class="btn-primary next-step"
                data-next="4"
                data-en="Next: Details"
                data-es="Siguiente: Detalles">
          Next: Details
        </button>
      </div>

    </div>

    <!-- STEP 4: DETAILS -->
    <div class="form-step" data-step="4">

      <h2 data-en="Additional Details" data-es="Detalles Adicionales">
        Additional Details
      </h2>

      <div class="form-field">
        <label data-en="Any prior flood claims?"
               data-es="¿Algún reclamo previo por inundación?">
          Any prior flood claims?
        </label>
        <textarea name="prior_claims" rows="3"></textarea>
      </div>

      <div class="form-field">
        <label data-en="Additional Notes"
               data-es="Notas Adicionales">
          Additional Notes
        </label>
        <textarea name="notes" rows="4"></textarea>
      </div>

      <div class="wizard-nav">
        <button type="button" class="btn-secondary prev-step"
                data-prev="3"
                data-en="Back"
                data-es="Atrás">
          Back
        </button>
        <button type="button" class="btn-primary next-step"
                data-next="5"
                data-en="Next: Submit"
                data-es="Siguiente: Enviar">
          Next: Submit
        </button>
      </div>

    </div>

    <!-- STEP 5: SUBMIT -->
    <div class="form-step" data-step="5">

      <h2 data-en="Submit Application" data-es="Enviar Solicitud">
        Submit Application
      </h2>

      <div class="form-field">
        <label data-en="Upload Documents (Optional)"
               data-es="Cargar Documentos (Opcional)">
          Upload Documents (Optional)
        </label>
        <input type="file" name="documents" multiple>
      </div>

      <div class="form-field checkbox-field">
        <label>
          <input type="checkbox" name="consent" required>
          <span data-en="I confirm the information provided is accurate."
                data-es="Confirmo que la información proporcionada es correcta.">
            I confirm the information provided is accurate.
          </span>
        </label>
      </div>

      <div class="wizard-nav">
        <button type="button" class="btn-secondary prev-step"
                data-prev="4"
                data-en="Back"
                data-es="Atrás">
          Back
        </button>
        <button type="submit" class="btn-primary"
                data-en="Submit Application"
                data-es="Enviar Solicitud">
          Submit Application
        </button>
      </div>

    </div>

  </form>

</section>

<footer id="aces-footer"></footer>

</body>
</html>
